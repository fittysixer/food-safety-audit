<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Guys | Food Safety Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@200;300;400&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a0a;
            margin: 0;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }
        .heading-spaced { letter-spacing: 0.15em; }

        /* === BRAND TOKENS (from fsagent-modular.vercel.app) === */
        :root {
            --fg-red: #c41230;
            --fg-red-rgb: 200, 16, 46;
            --bg-dark: #0a0a0a;
            --card-bg: linear-gradient(135deg, rgba(var(--fg-red-rgb), 0.10) 0%, rgba(var(--fg-red-rgb), 0.04) 100%);
            --card-border: rgba(var(--fg-red-rgb), 0.16);
            --card-border-left: rgba(var(--fg-red-rgb), 1);
            --card-shadow: 0 2px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
            --card-radius: 14px;
            --card-transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            --icon-bg: rgba(255,255,255,0.05);
            --icon-border: rgba(255,255,255,0.10);
        }

        /* === CHECKERED BACKGROUND — matches Brand Hub === */
        .hub-checkered-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .hub-checkered-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-conic-gradient(rgba(255,255,255,0.5) 0% 25%, transparent 0% 50%);
            background-size: 32px 32px;
            opacity: 0.015;
        }
        .hub-checkered-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center top, rgba(255,255,255,0.03) 0%, transparent 55%);
        }

        /* === CARD SYSTEM === */
        .fg-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 3px solid var(--fg-red);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            transition: var(--card-transition);
            position: relative;
        }
        .fg-card-interactive:hover {
            transform: translateY(-2px) scale(1.005);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.15);
        }
        .fg-card-interactive:active {
            transform: translateY(0) scale(0.998);
        }
        .fg-card-flat {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--card-radius);
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .fg-card-stat {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* === ICON CONTAINERS (44px, matches live hub) === */
        .fg-icon-box {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--icon-bg);
            border: 1px solid var(--icon-border);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .fg-icon-box svg {
            width: 20px;
            height: 20px;
            stroke: var(--fg-red);
            stroke-width: 1.8;
            fill: none;
        }

        /* === STICKY SCORE TRACKER === */
        .fg-score-tracker {
            position: sticky;
            top: 0;
            z-index: 40;
            background: linear-gradient(180deg, rgba(10,10,10,0.96) 0%, rgba(10,10,10,0.92) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(200,16,46,0.2);
            padding: 8px 0;
            transition: box-shadow 0.2s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 1px 0 rgba(200,16,46,0.12);
        }
        .fg-score-tracker-inner {
            max-width: 64rem;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .fg-tracker-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 4px;
            flex-shrink: 0;
        }
        .fg-tracker-logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.08em;
            color: white;
            line-height: 1;
        }
        .fg-tracker-metrics {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: flex-end;
        }
        .fg-tracker-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.2s ease;
        }
        .fg-tracker-pill:hover {
            background: rgba(255,255,255,0.06);
        }
        .fg-tracker-pill .tracker-label {
            color: rgba(255,255,255,0.45);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .fg-tracker-pill .tracker-value {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
        }
        .fg-tracker-pill.pill-score {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .fg-tracker-divider {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        /* === FORM INPUTS === */
        .fg-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .fg-input:focus {
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
        }
        .fg-input::placeholder { color: rgba(255,255,255,0.25); }
        .fg-input-readonly {
            background: rgba(255,255,255,0.02);
            border-color: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            cursor: default;
        }
        select.fg-input { cursor: pointer; }
        select.fg-input option { background: #1a1a1a; color: white; }

        /* === BUTTONS === */
        .fg-btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--fg-red) 0%, #a00e28 100%);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.15em;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(var(--fg-red-rgb), 0.25), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        .fg-btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(var(--fg-red-rgb), 0.35), inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .fg-btn-primary:active:not(:disabled) {
            transform: translateY(1px);
        }
        .fg-btn-primary:disabled {
            background: linear-gradient(135deg, #333 0%, #222 100%);
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* === SCORE BUTTONS (Compliant / Not Compliant / N/A) === */
        .fg-score-btn {
            flex: 1;
            padding: 14px 12px;
            min-height: 48px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }
        .fg-score-btn:hover { border-color: rgba(255,255,255,0.4); color: white; }
        .fg-score-btn.active-compliant {
            background: transparent;
            border-color: #22c55e;
            color: #22c55e;
            box-shadow: 0 0 8px rgba(34,197,94,0.15);
        }
        .fg-score-btn.active-noncompliant {
            background: transparent;
            border-color: var(--fg-red);
            color: var(--fg-red);
            box-shadow: 0 0 8px rgba(var(--fg-red-rgb),0.15);
        }
        .fg-score-btn.active-na {
            background: transparent;
            border-color: #60a5fa;
            color: #60a5fa;
            box-shadow: 0 0 8px rgba(96,165,250,0.15);
        }

        /* === COACHED TOGGLE SWITCH === */
        .fg-toggle-track {
            width: 36px;
            height: 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.12);
            position: relative;
            cursor: pointer;
            transition: background 0.2s ease;
            flex-shrink: 0;
        }
        .fg-toggle-track.active {
            background: var(--fg-red);
        }
        .fg-toggle-knob {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.2s ease;
        }
        .fg-toggle-track.active .fg-toggle-knob {
            left: 18px;
        }

        /* === PROGRESS BAR === */
        .fg-progress-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .fg-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--fg-red), #e8364f);
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* === RISK BADGES === */
        .fg-badge { padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 11px; letter-spacing: 0.05em; }
        .fg-badge-code { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); }
        .fg-badge-critical { background: rgba(var(--fg-red-rgb),0.12); color: #f87171; border: 1px solid rgba(var(--fg-red-rgb),0.25); }
        .fg-badge-noncritical { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.15); }
        .fg-badge-info { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.12); }
        .fg-badge-repeat { background: rgba(var(--fg-red-rgb),0.08); color: #f87171; border: 1px solid rgba(var(--fg-red-rgb),0.15); }
        .fg-badge-prior-nc { background: rgba(251,191,36,0.08); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); font-size: 10px; }
        .fg-badge-prior-coached { background: rgba(251,146,60,0.08); color: #fb923c; border: 1px solid rgba(251,146,60,0.2); font-size: 10px; }

        /* === FLOATING BUTTON === */
        .fg-float-btn {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom, 24px));
            right: 24px;
            z-index: 50;
            background: linear-gradient(135deg, var(--fg-red) 0%, #a00e28 100%);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.08em;
            padding: 14px 20px;
            min-height: 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(var(--fg-red-rgb),0.25);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fg-float-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(var(--fg-red-rgb),0.35); }

        /* === AI INSIGHT CARDS === */
        .fg-insight-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--card-radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .fg-insight-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--fg-red), #e8364f, rgba(255,255,255,0.1));
        }
        .fg-insight-glow {
            background: radial-gradient(ellipse at top left, rgba(var(--fg-red-rgb),0.06) 0%, transparent 60%);
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }

        /* === ELAPSED TIMER === */
        .fg-timer-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 16px;
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.08);
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            font-variant-numeric: tabular-nums;
        }

        /* === TRACKER RESPONSIVE === */
        @media (max-width: 600px) {
            .fg-score-tracker-inner { gap: 6px; padding: 0 8px; }
            .fg-tracker-logo-text span:last-child { display: none; } /* hide "FOOD SAFETY ASSESSMENT" */
            .fg-tracker-logo-text span:nth-child(2) { display: none; } /* hide divider */
            .fg-tracker-pill .tracker-label { display: none; }
            .fg-tracker-pill { padding: 5px 8px; gap: 0; }
            .fg-tracker-pill .tracker-value { font-size: 13px; }
            .fg-tracker-divider { height: 14px; }
            .fg-timer-pill { font-size: 10px; padding: 3px 7px; }
        }
        @media (max-width: 400px) {
            .fg-tracker-logo-text { font-size: 11px !important; }
            .fg-tracker-pill { padding: 4px 6px; }
            .fg-tracker-pill .tracker-value { font-size: 12px; }
        }

        /* === ANIMATIONS === */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes countUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(var(--fg-red-rgb), 0.1); }
            50% { box-shadow: 0 0 25px rgba(var(--fg-red-rgb), 0.2); }
        }
        .anim-fade-slide { animation: fadeSlideIn 0.35s ease-out both; }
        .anim-fade { animation: fadeIn 0.3s ease-out both; }
        .anim-count { animation: countUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .anim-delay-1 { animation-delay: 0.05s; }
        .anim-delay-2 { animation-delay: 0.1s; }
        .anim-delay-3 { animation-delay: 0.15s; }
        .anim-delay-4 { animation-delay: 0.2s; }
        .anim-delay-5 { animation-delay: 0.25s; }
        .anim-delay-6 { animation-delay: 0.3s; }
        .anim-delay-7 { animation-delay: 0.35s; }
        .anim-delay-8 { animation-delay: 0.4s; }
        .anim-delay-9 { animation-delay: 0.45s; }
        .anim-delay-10 { animation-delay: 0.5s; }

        /* === PRINT === */
        /* FEATURE 4: Print-optimized styles */
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .hub-checkered-bg { display: none !important; }
            .fg-card, .fg-card-flat, .fg-card-stat, .fg-insight-card { background: white !important; border-color: #ddd !important; box-shadow: none !important; color: black !important; }
            .fg-badge { background: #f5f5f5 !important; border-color: #999 !important; color: black !important; }
            .fg-progress-fill { background: #666 !important; }
            h1, h2, h3, h4, h5, h6 { color: black !important; }
            p, span, div { color: black !important; }
            a { color: #0066cc !important; text-decoration: underline; }
            .text-red-400, .text-green-400, .text-gray-300, .text-gray-400, .text-gray-500, .text-gray-600, .text-white { color: black !important; }
            /* Ensure findings section prints clearly */
            .anim-fade, .anim-fade-slide, .anim-count { opacity: 1 !important; animation: none !important; }
            page-break-inside: avoid;
        }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
    <div class="hub-checkered-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef, useCallback } = React;

        /* ===== SVG ICON LIBRARY ===== */
        const SvgIcons = {
            Thermometer: () => (
                <svg viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round">

                </svg>
            ),
            Droplet: () => (

            ),

            ),
            Building: () => (

                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/>

            ),
            Clipboard: () => (

                </svg>
            ),
            Package: () => (
                <svg viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M16.5 9.4l-9-5.19"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            ),
            AlertTriangle: () => (
                <svg viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            ),
            Shield: () => (
                <svg viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            ),
            ShieldAlert: () => (
                <svg viewBox="0 0 24 24" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/>
                </svg>
            ),

            '101': { title: 'Cold Food Temps — On the Line', video_url: '', overview: 'Walk the entire line and temp every cold PHF: salad bar, chef base, milkshake cooler, and the ice bath for cheese at the grill. Every product must read 41°F (5°C) or below. Deductions stack across observation units — two products out of temp means double the hit.', procedure: ['Start at the salad bar. Temp every container of cut produce — tomatoes, mushrooms, jalapeños, green peppers, onions, lettuce.','Move to the dressing station. Temp all cold-held sauces and any produce stored there.','Check the ice bath at the grill. Lift the sliced cheese container and confirm the ice level is still solid beneath it. Temp the cheese.','Open the chef base drawers. Temp raw beef, sliced cheese, hot dogs — everything inside.','Check the milkshake mix-in station. Temp blended strawberries, bananas, and any other PHF items.','Record each reading individually. Any product 42–50°F is a 3-pt deduction. Over 50°F is a 5-pt hit.'], scoring: '42°F–50°F = 3 pt deduction per observation. Over 50°F = 5 pt deduction. Max 10 pts total. Repeat finding from prior audit adds +1 pt.', areas: [{ name: 'Ice Bath at Grill', pct: '24%', products: 'Sliced cheese (100% of findings here)', cause: 'Melted ice — check and refill ice level before every 2-hour temp cycle' },{ name: 'Chef Base Drawers', pct: '24%', products: 'Raw beef, sliced cheese, hot dogs', cause: 'Unit struggling against radiant grill heat — check gaskets, don\'t overload' },{ name: 'Dressing Station', pct: '16%', products: 'Tomatoes (67%), mushrooms (33%)', cause: 'Lid left open during service or container overstacked' },{ name: 'Milkshake Mix-in', pct: '16%', products: 'Blended strawberries (83%), bananas', cause: 'Fountainette temp drifting — verify unit is holding below 41°F' },{ name: 'Reach-in Coolers', pct: '11%', products: 'Tomatoes, strawberries', cause: 'Overloading the unit, door left open, worn gaskets' },{ name: 'Milkshake Machine', pct: '8%', products: 'Milkshake base', cause: 'Machine maintenance — temp not holding consistently' }], tips: ['Validate tomato temps in the walk-in cooler BEFORE bringing them to the line.','Never overstack containers — airflow is what keeps product cold.','Keep lids closed whenever not actively serving.','International/JV: Where legal limit is 4°C, score 3 pts for 4.5–9°C and 5 pts for over 9°C. Where meat limit is 2°C, score 3 pts for 2.5–7°C and 5 pts over 7°C.'] },
            '101a': { title: 'Walk-in Cooler Ambient', check: 'Use your thermocouple to capture the ambient air temperature inside the walk-in cooler. If the reading is 42\u00B0F or below, mark Compliant. If above 42\u00B0F, mark Not Compliant. If ComplianceMate is installed, also record what the sensor is reading so the team can cross-reference.', tips: 'This is an ambient air reading, not a product temp. A warm ambient reading is a warning sign \u2014 check product temps carefully under 101 and 105.' },
            '101b': { title: 'Chef Base Ambient', check: 'Check the ambient air temperature of the chef base (the meat cooler under the grill). Use your thermocouple. If no food is present in the unit, mark Compliant \u2014 an empty unit running cold is doing its job. If food is present, the air must be 42\u00B0F or below.', tips: 'The chef base takes a beating from grill heat all day. A warm ambient reading here is common \u2014 flag it and investigate product temps.' },
            '101c': { title: 'Dressing Station Ambient', check: 'Record the ambient air temperature of the dressing station. If no food is present, mark Compliant. If food is present, the air must read 42\u00B0F or below. Also record the ComplianceMate sensor reading if the location has one.', tips: 'The dressing station is constantly opened during service. Ambient temps creep up fast \u2014 this is a leading indicator of product temp issues.' },
            '101d': { title: 'Milkshake Mix-in Ambient', check: 'Record the ambient temperature of the milkshake mix-in station. This is informational only \u2014 no points are attached. Document the reading for trending purposes.', tips: 'Even though this is non-scored, a warm reading here means your blended strawberries, bananas, and milkshake base are at risk. Treat it like an early warning.' },
            '101L': { title: 'Cut Lettuce Temp', check: 'Capture the temperature of the cut lettuce on the line. As of Q1 2026, this is non-scored and informational only \u2014 no deduction will apply. Document the reading.', tips: 'This was moved to informational status, but lettuce temps still matter for food quality. If it is warm, coach the team on rotation and cold-chain practices.' },
            '103': { title: 'Hot Holding Temps', video_url: '', overview: 'We only hold hot food in one spot — the hot holding unit with grilled onions and mushrooms. Both products must read 140°F or above. Scoring is tiered based on how far below the threshold the product has fallen.', procedure: ['Approach the hot holding unit on the line.','MOUND the onions into the corner of their container — push them into a tight pile, not spread thin.','Insert the probe into the center of the mound and record the reading.','Repeat for the mushrooms in their container — mound into the corner, probe the center.','If either product reads below 140°F, check and record the water level in the hot well.'], scoring: '130–139°F = 3 pt deduction. Below 130°F = 5 pt deduction. Max 10 pts with multiple observations.', areas: [{ name: 'Hot Well Unit', pct: '100%', products: 'Grilled onions, grilled mushrooms', cause: 'Insufficient water level in the hot well — top off every 2 hours when you take temps' }], tips: ['Every 2-hour temp check should include a water level check — establish a fill line and maintain it.','Do not spread product thin across the container — mounding retains heat.','If temp issues are caused by handling (product sat out too long before going into the well), score item 114 instead.','International/JV: Where 65°C is required, score 3 pts for 62–64.9°C and 5 pts below 62°C. Where 63°C required, 3 pts for 60–62.9°C and 5 pts below 60°C.'] },
            '105': { title: 'Walk-in Cooler Product Temps', video_url: '', overview: 'Same 41°F standard as the line, but the walk-in has a critical difference: freshly prepped product gets a 2-hour cooling window before it can be assessed. Accurate prep-time labels are your best defense.', procedure: ['Enter the walk-in and identify all prepped PHF items with date/time labels.','Check each label — any product past its 2-hour cooling window is eligible for temping.','Probe raw hot dogs FIRST, then raw patties — this avoids cross-contamination on your thermometer.','Temp all prepped produce: tomatoes, mushrooms, jalapeños, green peppers, lettuce.','Temp ground beef cambros, sliced cheese, and any other PHF product.','For any reading over 41°F, record the product, the reading, and the label time.'], scoring: 'Same tiered scoring as 101: 42–50°F = 3 pts per observation, over 50°F = 5 pts.', areas: [{ name: 'Tomatoes', pct: '60%', products: 'Sliced tomatoes in black tubs', cause: 'Not labeled at exact prep completion time — cooling window cut short' },{ name: 'Ground Beef', pct: '20%', products: 'Raw patties in cambros', cause: 'All cambros labeled with the same start time instead of actual finish time' },{ name: 'Other Produce', pct: '20%', products: 'Mushrooms, hot dogs, cheese', cause: 'Warm AFVT wash solution raising product temp before cooling starts' }], tips: ['Label each cambro with the EXACT time you finished prepping it — not when you started.','Prep tomatoes into the black tub and label immediately upon completion.','Monitor your AFVT wash solution temperature — warm solution raises product temp and eats into the 2-hour cooling window.','The scenario that gets teams in trouble: 5 cambros of meat all labeled "8:00 AM" but the last one wasn\'t finished until 9:45 AM.'] },
            '201': { title: 'Thermometers Available', video_url: '', overview: 'Accurate, working thermometers must be readily available in all food areas. Thermometers must be accurate to within +/- 2°F.', procedure: ['Verify thermometers are available in food receiving area', 'Check thermometers are present in food prep areas', 'Confirm thermometers are accessible in food holding areas', 'Verify thermometers are available at food service stations', 'Test thermometer accuracy using ice bath and hot water calibration methods', 'If using ComplianceMate, locate the calibration app in main menu under Lists'], tips: ['Thermometers must be accurate to within +/- 2°F.', 'If ComplianceMate is used, calibration records must be up to date.', 'Score the area that lacks access to a working thermometer.', 'Check ComplianceMate calibration app near the bottom of main menu if available.'] },
            '202': { title: 'Unit Thermometers', video_url: '', overview: 'Every refrigerated unit must have a physical hanging thermometer visible inside. Digital readouts on the outside or ComplianceMate sensors alone do not satisfy this requirement.', procedure: ['Open each cooler and look for a hanging thermometer inside', 'Verify the thermometer is easy to read without moving product', 'Check all reach-in coolers have internal thermometers', 'Check all walk-in coolers have internal thermometers visible', 'Verify chef base and dressing station have internal thermometers', 'Confirm thermometers are legible and functioning'], tips: ['A digital readout on the outside of the unit is NOT acceptable.', 'ComplianceMate sensors alone are NOT acceptable.', 'Do not score if thermometers are present but not in the most easily viewable position.'] },
            '122': { title: 'Handwashing Practices', video_url: '', overview: 'This is an observation-based item — step back and watch the team in real time. You are looking for proper handwashing technique and appropriate timing (before/after key activities). One of the highest-value items on the audit.', procedure: ['Observe the team for several minutes without announcing what you are watching for.','Correct technique: (1) Wet hands and forearms with hot water. (2) Apply soap. (3) Scrub 20 seconds including fingertips, between fingers, under nails. (4) Rinse. (5) Dry with paper towel. (6) Use towel to turn off faucet.','Watch for required wash triggers: before food prep, handling clean dishes, putting on gloves, changing tasks. After: restroom, touching face/hair, soiled items, raw meat, chemicals, money, POS, phone, eating/drinking, removing gloves.','Apply Five Guys exceptions: fry/dressing station employees do NOT need to wash between glove changes if staying at the same station. Grill employees do NOT need to wash between same-task glove changes. Dressing buns + wrapping sandwiches = same task.'], scoring: '4 points — Critical. One of the highest-value items.', areas: [{ name: 'Task Changes in Kitchen', pct: '50%', products: 'Grill cook helping drop buns, wrap burgers, or pull pre-cooks', cause: 'Employee switching tasks without washing — biggest system-wide opportunity' },{ name: 'After Touching Non-Food Items', pct: '30%', products: 'POS, phone, trash, face/hair', cause: 'Employee returns to food handling without washing after a non-food task' },{ name: 'Glove Changes', pct: '20%', products: 'Raw to RTE transitions', cause: 'Gloves changed but hands not washed underneath — especially between raw meat and buns' }], tips: ['Coach but do not score if scrub time is slightly under 20 seconds with good-faith effort.','Coach but do not score if towels are not used to turn off the faucet.','Always demonstrate proper technique to employees who wash improperly.','The grill cook who wants to help anywhere else MUST wash and re-glove first — this is the #1 scoring scenario.'] },
            '123': { title: 'No Bare Hand Contact', video_url: '', overview: 'Nobody should ever touch or handle food with bare hands. Gloves must be readily available and in use at every food-handling station. This is a straightforward observation — did bare skin touch ready-to-eat food?', procedure: ['Observe all food-handling stations during prep, assembly, and service.','Watch for bare skin contacting ready-to-eat food.','Verify gloves are stocked and accessible at every station.'], scoring: '3 points — Critical.', tips: ['Coach but do not score for incidental contact (briefly brushing against an item).','For improper glove USE (torn, not changed), score item 230 instead.','This item is specifically about bare skin on RTE food — no gloves at all.'] },
            '125': { title: 'Eating, Drinking & Tobacco', video_url: '', overview: 'The #1 scoring issue is a drink without a lid and a straw. No cans, bottles, or coffee cups allowed in the restaurant. Clean personal cups are fine WITH a secure lid and straw.', procedure: ['Check every crew member\'s drink — must be in a cup with a secure lid and straw.','No cans, bottles, or coffee cups anywhere in the restaurant.','If a cup has an attached straw feature, it must stay in the open position.','Observe for eating in the back of house — prohibited except for afternoon fry calibration tasting.','Fry calibration tasting is allowed in the dining room or prep room only.'], scoring: '3 points — Critical.', tips: ['If food or drink is improperly stored for later consumption (hidden in walk-in or office), score item 233 instead.','Personal food must be in a designated area separate from or below food for sale.','Chewing gum and chewing tobacco count as eating.'] },
            '229': { title: 'Handwash Facilities', video_url: '', overview: 'Every handwash sink in food areas must be clean, unobstructed, and fully stocked. 128+ findings system-wide — the most common issue is sinks blocked by equipment.', procedure: ['Check every handwash sink in the kitchen and prep areas.','Verify nothing is blocking access — no carts, prep tables, or storage in front.','Run the hot water and verify temperature is adequate.','Check soap dispenser is full and functioning.','Verify paper towels are available.','Confirm handwashing signage is posted.'], scoring: '1 point — Non-Critical.', areas: [{ name: 'Sink Accessibility', pct: '40%', products: 'Hand sinks in prep areas and cook line', cause: 'Sinks blocked by carts, prep tables, or storage — keep a clear path at all times' },{ name: 'Hot Water Temperature', pct: '30%', products: 'All hand sinks', cause: 'Water heater issues — readings of 54–80°F instead of required 100°F+' },{ name: 'Sink Misuse', pct: '20%', products: 'Hand sinks being used for other purposes', cause: 'Crew dumping sanitizer, filling water cups, or washing produce in hand sinks' },{ name: 'Cleanliness & Supplies', pct: '10%', products: 'Soap dispensers, paper towels, sink basin', cause: 'Scale/lime buildup on faucets, empty soap dispensers during rush' }], tips: ['For restroom handwash issues, score item 243 instead.','This item covers kitchen and prep area sinks only.','Sink misuse (washing produce, dumping sanitizer) is a training issue — coach and score.'] },
            '230': { title: 'Glove Usage', video_url: '', overview: 'Observe glove practices across all stations. Gloves must be changed when damaged, torn, or contaminated, and worn over bandages or artificial nails. On grill, change between raw beef and hot dogs.', procedure: ['Observe glove practices at all food prep stations', 'Watch for proper glove changes when damaged or torn', 'Verify gloves are worn over bandages and nail polish', 'Check gloves are worn over artificial nails', 'Confirm glove changes between handling raw beef and hot dogs on grill', 'Watch for contamination after touching hair, phone, or face with gloves', 'Monitor subtle violations like adjusting hat with gloved hands'], scoring: '2 points — Non-Critical.', tips: ['Score improper glove USE here.', 'For bare hand contact with RTE food (no gloves at all), score item 123 instead.', 'Watch for staff pulling phone out of pockets with gloved hands.', 'Gloves become contaminated after touching anything non-food related.'] },
            '231': { title: 'Personal Hygiene & Hair Restraints', video_url: '', overview: 'Food handlers must wear clean clothing, effective hair restraints (hairnets, hats, beard guards), and jewelry limited to a plain wedding band.', procedure: ['Check all food handlers wear clean clothing', 'Verify effective hair restraints are in use on all personnel', 'Check that hairnets are properly covering all hair', 'Verify hats are being worn properly', 'Confirm beard guards are in use where applicable', 'Check jewelry is limited to plain wedding band only', 'Look for watches, bracelets, rings with stones, or dangling earrings', 'Note: Missing beard guards (231a) are informational only as of Q1 2026'], tips: ['Risk is physical contamination from hair or jewelry falling into food.', 'Effective restraints mean hair is actually contained, not just a hat perched on top.', 'Beard guards became informational only as of Q1 2026 but should still be observed.', 'Metal jewelry can fall into food and create serious hazard.'] },
            '233': { title: 'Personal Items Storage', video_url: '', overview: 'All personal belongings (coats, bags, phones, keys) must be stored in a designated area separate from food storage and prep areas. Personal items must be below or away from food for public sale.', procedure: ['Identify designated area for personal item storage', 'Verify coats are stored in designated area', 'Check bags, phones, and keys are not in food areas', 'Ensure personal items are stored below food for public sale', 'Verify personal items are not on prep tables or food storage areas', 'Check designated area is separate and secure'], tips: ['If food is being eaten in the food area, score item 125 instead.', 'If personal food or drink is improperly stored (in walk-in cooler, on prep table), score here.', 'Personal items must not be above or adjacent to open food storage.'] },
            '108': { title: 'Food Sources & Packaging Condition', video_url: '', overview: 'Check product quality upon receipt. Most Five Guys deliveries happen overnight, so everything must be checked and put away within ONE HOUR of the manager\'s arrival the next morning. The biggest risk is mold on produce.', procedure: ['Inspect all received product for damaged packaging — tears, dents, broken seals.','Inspect produce closely for mold — strawberries are the #1 culprit.','If mold is found on one strawberry, discard affected product only. Run unaffected product through the AFVT.','Verify all product is from approved commercial suppliers.','Confirm everything is off the floor and properly stored within the 1-hour window.'], scoring: '3 points — Critical.', areas: [{ name: 'Strawberries', pct: '70%', products: 'Fresh strawberries', cause: 'Mold from extended storage — blend immediately upon receipt to minimize exposure' },{ name: 'Tomatoes', pct: '22%', products: 'Whole tomatoes', cause: 'Mold developing in cases during transit or overnight storage' },{ name: 'Other Produce', pct: '8%', products: 'Jalapeño peppers, other items', cause: 'Damaged packaging or spoilage not caught during receiving' }], tips: ['Blend strawberries immediately upon receipt to minimize storage time and mold risk.','If a product is homemade or not from a commercial supplier, frame the photo to clearly show the label and packaging.'] },
            '109': { title: 'Date Marking — Shelf Life Labels', video_url: '', overview: 'Every prepped product must be labeled with accurate information from the current Shelf Life Chart. The specialist checks every dated item in the restaurant. Open sauces are the #1 most common deduction.', procedure: ['Check all prepped produce: lettuce, lettuce wraps, sliced tomatoes, diced onions, cut jalapeños, green peppers, mushrooms, cut lemons.','Check all open sauces: mayo, A1, hot sauce, BBQ, HP sauce — this is the #1 deduction area.','Check strawberry and banana labels: both "Prepped" and "Marinade" versions. Check the cambro in the cooler AND the black container at the milkshake station.','Check ground beef patties and hot dogs — both prepped and opened.','NEW Q1 2026: Check unopened cases of hot dogs and cheese. If no date marking, document it (zero points).','Verify shift timing accuracy: AM = 9 AM–4 PM, PM = 4 PM–10 PM. 3-shift product expires at 4 PM on day 3. 4-shift expires at 10 PM on day 4.'], scoring: '3 points — Critical.', areas: [{ name: 'Open Sauces', pct: '35%', products: 'Mayo, A1, hot sauce, BBQ, HP sauce', cause: 'Sauce opened and put into use without dating — fill out the label BEFORE opening' },{ name: 'Strawberries & Bananas', pct: '25%', products: 'Marinade (5 days → 7 days) and Prepped (5 days)', cause: 'Two containers to check (cooler + milkshake station) — one often missed' },{ name: 'Ground Beef & Hot Dogs', pct: '25%', products: 'Patties in cambros, opened hot dog packages', cause: 'Labels written with start time instead of actual prep completion time' },{ name: 'Cut Produce', pct: '15%', products: 'Tomatoes, onions, jalapeños, green peppers, mushrooms', cause: 'Product prepped and stored without label — label before you cut' }], tips: ['Put the EXACT time on the label that the item was finished being prepped — not when you started.','Fill out the label BEFORE you open a bulk sauce bottle.','Sauce bottles in active use on the dressing station do not need dates, but must be labeled with the product name. Relabeling fades with dishwashing — check nightly.','Banana marinade is transitioning from 4 shifts to 7 days. Confirm your location\'s current standard.'] },
            '110': { title: 'Shelf Life Compliance — No Expired Product', video_url: '', overview: 'While 109 validates correct labels, this item checks that nothing has been held past its expiration. The specialist checks every dated product in the restaurant. The afternoon shift change is the #1 risk window.', procedure: ['Check every dated product on the line: patties, tomatoes, hot dogs, lettuce wraps, sauces.','Check every dated product in the walk-in: cheese, tomatoes, lettuce, hot dogs, strawberries, bananas.','Compare each label\'s expiration to the current time — anything past its date is a deduction.','Pay special attention to patties during afternoon assessments — 4 PM expirations are the most common find.'], scoring: '3 points — Critical.', areas: [{ name: 'Front of House — Line', pct: '55%', products: 'Ground beef patties, tomatoes, hot dogs, lettuce wraps', cause: 'Patties that expired at 4 PM still on the line during afternoon assessments — shift change gap' },{ name: 'Back of House — Walk-in', pct: '45%', products: 'Cheese, tomatoes, lettuce, hot dogs', cause: 'Blind restocking at close — cooler restocked without checking expiration dates' }], tips: ['Make the 4 PM meat check a non-negotiable part of every shift change.','Every trip into the cooler should include a quick label scan — make it habit.','Never blindly restock the cooler at night — validate every item for expiration before close is complete.','NEW Q1 2026: Unopened hot dog and cheese cases are now assessed. Discard product BEFORE its expiration if quality has deteriorated (brown lettuce, hardened cheese).'] },
            '116': { title: 'Cross-Contamination Prevention', video_url: '', overview: 'This item focuses on POTENTIAL contamination — the hazard exists but hasn\'t actually affected the food yet. Three categories: raw over ready-to-eat storage, physical hazards, and chemical storage violations.', procedure: ['Check walk-in cooler storage order — raw animal products must never be above RTE. Bacon must be above beef (bacon arrives fully cooked).','Look for push pins above food prep surfaces — score if they present an imminent hazard. Do NOT score if above bagged buns or bagged potatoes.','Check chemical storage — no chemicals above food or food-contact surfaces, including dry goods like gloves and to-go bags.','Breakfast locations: verify shelled eggs are stored below ground beef and all RTE foods.'], scoring: '3 points — Critical.', areas: [{ name: 'Raw Over RTE Storage', pct: '45%', products: 'Raw bacon below patties, improper cooler organization', cause: 'Not following the cooler organization chart — product put away wherever there\'s space' },{ name: 'Chemical Storage', pct: '35%', products: 'Spray bottles, cleaners hung above food areas', cause: 'Employee returns from dining room and hangs spray bottle on the nearest shelf' },{ name: 'Physical Hazards', pct: '20%', products: 'Push pins above prep surfaces', cause: 'Notices/signs posted directly above exposed food prep areas' }], tips: ['Follow the cooler organization chart every time product is put away.','Coach (do not score) if Coke Freestyle cartridges are above food or sanitizer bucket/spray is above packaged cups or bottled water.','If contamination has ALREADY happened (hair in food, chemical dripping on lettuce), score 117 instead.','If condensation is dripping above food, score 208.'] },
            '117': { title: 'Known Food Contamination', video_url: '', overview: 'The most serious single line item in the entire audit. While 116 looks for POTENTIAL contamination, this item scores when contamination has ACTUALLY occurred — hair in food, chemicals dripping on product, foreign objects in containers.', procedure: ['Identify the contamination — what is it, where is it, and what food is affected.','Notify the location manager IMMEDIATELY.','Record detailed observations: type of contaminant, affected product, location.','Photograph the contamination clearly — frame the shot to show the contaminant and surrounding context.','Recommend that all contaminated product be discarded.'], scoring: '4 points — Critical. Highest-point critical single observation on the audit.', areas: [{ name: 'Physical Contamination', pct: '50%', products: 'Hair in food, push pins in product, foreign objects', cause: 'Inadequate hair restraints or physical hazards above prep surfaces' },{ name: 'Chemical Contamination', pct: '30%', products: 'Cleaner dripping on food, chemical overspray', cause: 'Chemicals used near exposed food or improperly stored above food areas' },{ name: 'Biological Contamination', pct: '20%', products: 'Cross-contact from raw to RTE', cause: 'Actual transfer of contaminant from raw product to ready-to-eat food' }], tips: ['Score the end result here regardless of root cause — actual contamination takes priority over the cause.','If contamination was caused by improper handwashing, still score HERE, not 122.','If raw product was above RTE but didn\'t actually contaminate the food, score 116 instead.','Frame your photo to clearly show the contamination (e.g., hair visible in the cheese pan).'] },
            '205': { title: 'AFVT Produce Wash', video_url: '', overview: 'All produce must be washed with Ecolab AFVT sanitizer at 0.75-1.0 oz per gallon, which reduces E. coli, Listeria, and Salmonella by up to 99.9%.', procedure: ['Check AFVT sanitizer solution is in use and properly mixed', 'Test concentration with concentration kit (must read 0.75-1.0 oz per gallon)', 'Document concentration in ounces per gallon, not dilution ratio', 'Pull a sample in a 1/3 pan if in-use solution is questionable', 'Verify all produce except potatoes and mushrooms goes through the wash', 'Check that solution is changed according to schedule'], scoring: '2 points — Non-Critical.', tips: ['Potatoes and mushrooms are NOT treated with AFVT.', 'Document the concentration as ounces per gallon (e.g., 1.25), NOT as 1:64 ratio.', 'Score if raw fruits and vegetables are not being washed before processing.', 'For process issues not specifically listed, coach rather than score.'] },
            '208': { title: 'Food Protection from Environment', video_url: '', overview: 'All food must be protected from contamination: covered during storage and transport, shielded during prep and service. Check for environmental contamination risks like condensation and peeling paint.', procedure: ['Check all containers in walk-in cooler are covered', 'Verify food is covered during transit from cooler to line', 'Check for uncovered food on display', 'Look for condensation dripping above exposed food or food-contact surfaces', 'Check ceiling for chipping paint or damage above food areas', 'Verify proper covers are used (items may be loosely covered only during active cooling)', 'Confirm whole fruits and vegetables that will be washed or peeled are properly handled'], tips: ['Items may be left loosely covered ONLY during the active cooling process.', 'Whole fruits and vegetables that will be washed or peeled do not need to be covered.', 'Opened boxes of peanuts in the dining room are acceptable.', 'For raw product over RTE, score item 116 instead.', 'If sanitizer buckets are on the floor, score item 224.'] },
            '209': { title: 'Food Container Identification', video_url: '', overview: 'Every bulk food container must be labeled with the common name of the product inside, unless contents are completely visible through the container.', procedure: ['Check all bulk food containers have product name labels', 'Verify labels are legible and affixed properly', 'Check the blue Kleen cup at milkshake station is labeled if it contains water', 'Verify all unlabeled containers have obviously visible contents', 'Do not score unlabeled salt and Cajun shakers at fry station', 'Do not score salt or Cajun spice temporarily stored in unlabeled cups overnight'], scoring: '1 point — Non-Critical.', tips: ['Contents are completely obvious if you can see the product through the container.', 'Do NOT score for unlabeled salt and Cajun shakers at the fry station.', 'Do NOT score if salt or Cajun spice is temporarily in an unlabeled cup while shaker is being washed.', 'Score unlabeled spray bottles containing food-grade oil under this item, not 127.'] },
            '210': { title: '6-Inch Rule — Off the Floor', video_url: '', overview: 'All food and food-contact packaging must be stored at least 6 inches off the floor in all areas including walk-in cooler, dry storage, delivery staging, and under prep tables.', procedure: ['Check walk-in cooler floor for items stored directly on floor', 'Inspect dry storage for items below the 6-inch mark', 'Check delivery staging area for product placement', 'Look under prep tables for stored items on the floor', 'Verify received deliveries are moved off floor within one hour of receipt', 'For overnight key-drop deliveries, verify items are off floor within one hour of manager arrival'], scoring: '1 point — Non-Critical.', tips: ['Frame photos to show the item on the floor and surrounding area to identify location.', 'If floor beneath inverted milk crates used as shelving is soiled, score item 225 instead.'] },
            '120': { title: 'Sanitizer Concentration', video_url: '', overview: 'Test every sanitizer solution in the restaurant — every bucket, spray bottle, and dispensing system. The specialist uses test strips to validate proper concentration. This is one of the highest-value items on the entire audit.', procedure: ['Locate all sanitizer solutions: line bucket, prep bucket, spray bottles, dispensing systems.','For QUAT (Kayquat II): dip the test strip for 10 seconds, then instantly compare. Acceptable range is 150–400 PPM. Solution should be 65–75°F.','For KAY-5 chlorine: dip and remove quickly, blot immediately with a paper towel, then compare. Acceptable range is 50–100 PPM.','Record the PPM reading for each solution tested.','If another approved chemical is in use at the proper concentration, do not score.'], scoring: '4 points — Critical. One of the highest-value items on the audit.', areas: [{ name: 'QUAT Sanitizer (Buckets & Sprays)', pct: '65%', products: 'Kayquat II solution in buckets and spray bottles', cause: 'Dispenser not primed, solution not changed every 2 hours, or wrong dilution' },{ name: 'Kay-5 Chlorine', pct: '35%', products: 'Kay-5 solution for milkshake machine sanitizing', cause: 'Concentration drifting — not tested with chlorine strips before use' }], tips: ['Change sanitizer solution every 2 hours — it weakens with use.','Always test with the correct strip type: QT-40 for quat, chlorine strips for Kay-5.','Canada: Kayquat I at 150–400 PPM.','International/JV: Quat in Europe 400–600 PPM. Asia (except China) and MENA 200–400 PPM. China 150–200 PPM. Kay 5 in Middle East and Asia 50–100 PPM.'] },
            '127': { title: 'Chemical Labeling', video_url: '', overview: 'Every chemical bottle must have a legible label matching its contents. Working containers need common name labels like "Sanitizer" or "Degreaser".', procedure: ['Verify original manufacturer containers have legible labels', 'Check all working containers (spray bottles, buckets) are labeled with product name', 'If using store-purchased bottles, write the product name in permanent marker', 'Ensure labels are legible and not faded'], scoring: '3 points — Critical.', tips: ['For chemicals improperly stored above food, score item 116 instead.', 'For actual food contamination by chemicals, score item 117.', 'For unlabeled spray bottles containing food-grade oil, score item 209 instead.'] },
            '212': { title: 'Cleaning Tool Storage', video_url: '', overview: 'All cleaning tools must be properly stored to prevent contamination. No sponges or grill bricks are permitted.', procedure: ['Check cleaning tool storage areas between uses', 'Verify no sponges are present anywhere in the facility', 'Verify no grill bricks are being used or stored', 'Ensure tools are stored away from food and equipment', 'Check that tools cannot contaminate food-contact surfaces', 'Verify proper storage methods are used for all cleaning equipment'], scoring: '1 point — Non-Critical.', tips: ['Do NOT score for Magic Erasers.', 'Do NOT score if Kleen Cup brushes (for milkshake machine cleaning) are stored with clean utensils.', 'These brushes are food-contact brushes and are approved for that storage.', 'For wet mops and brooms not hung to dry, score item 239 instead.', 'Focus is on tools that could contaminate food-contact surfaces.'] },
            '214': { title: 'Three-Compartment Sink', video_url: '', overview: 'The three-compartment manual warewashing setup must be clean, properly maintained, and operated in the correct Wash-Rinse-Sanitize sequence.', procedure: ['Verify all three compartments are clean and in good repair', 'Check that detergent is stocked in the wash compartment', 'Confirm water level in each compartment is adequate', 'Verify Wash-Rinse-Sanitize process happens in correct order', 'Check drain boards are not bent and shed water properly', 'Ensure basins are large enough and filled high enough to immerse at least half of largest equipment', 'Verify sinks are not being used for both dishwashing and food prep simultaneously'], tips: ['Do not score for a crew member using a single paper towel to dry one piece of dishware.', 'Score if they use one paper towel for multiple items.', 'Score damage to the dishwashing sinks under this item, including bent drain boards.', 'Basins must be large enough to immerse at least half of the largest piece being cleaned.'] },
            '227': { title: 'Wiping Cloths', video_url: '', overview: 'Wiping cloths must be kept clean and dry OR fully immersed in properly diluted sanitizer. Food-contact cloths must be separate from non-food-contact cloths.', procedure: ['Check all wiping cloths are clean and dry or fully immersed in sanitizer', 'Verify food-contact cloths are kept separate from non-food-contact cloths', 'Check sanitizer concentration is correct if cloths are immersed', 'Verify dry bar towels used for grease wiping are acceptable', 'Ensure cloths are changed when contaminated', 'Check cloth storage and handling procedures'], scoring: '2 points — Non-Critical.', tips: ['Separate cloths MUST be used for food-contact versus non-food-contact surfaces.', 'Dry bar towels for wiping grease from equipment are acceptable.', 'If sanitizer concentration in cloth bucket is wrong, score item 120 instead.', 'If buckets are not set up at all, score item 224.'] },
            '118': { title: 'Food-Contact Surface Cleanliness', video_url: '', overview: 'Every surface that touches food gets assessed for cleanliness. Surfaces must be cleaned and sanitized at least every 4 hours during continuous use. This item has a wide footprint — the specialist checks equipment across the entire restaurant.', procedure: ['Check drink nozzles — remove 2 soda nozzles and inspect inside for organic buildup.','Inspect the ice machine chute and the BOH deflector. Use a flashlight — this is the only way to catch early buildup.','Check the milkshake spindle — verify the Kleen Cup is being used at the correct frequency.','Inspect clean dish storage: tomato slicer, fry cutter, blender, shake inserts/cambros, spatulas, knives, and cutting boards.','For cutting boards: Five Guys standard is stricter than Steritech — score if ANY gouges/gashes have debris or any visible debris at all.','For Coke Freestyle: check nozzle, ice chute, and lever. Do NOT open front covers.'], scoring: '3 points — Critical.', areas: [{ name: 'Drink Nozzles & Ice Machines', pct: '35%', products: 'Soda nozzle interiors, ice chute, BOH deflector', cause: 'Organic buildup from infrequent deep cleaning — needs flashlight inspection' },{ name: 'Cutting Boards', pct: '25%', products: 'All boards stored as "clean" at the 3-comp sink', cause: 'Gouges with trapped debris — boards need scrubbing, not just rinsing' },{ name: 'Milkshake Equipment', pct: '20%', products: 'Spindle, inserts, cambros, blender', cause: 'Kleen Cup not used at scheduled frequency' },{ name: 'Smallwares in Clean Storage', pct: '20%', products: 'Tomato slicer, fry cutter, spatulas, knives', cause: 'Dish wash shortcuts — spray-off instead of scrub-and-detail' }], tips: ['Dishwashing is not just spraying everything off — scrub and detail clean every piece.','When at the 3-comp sink, photograph boards hanging as clean for both 118 and 119.','Score here if thermometer probes are not properly washed and sanitized before use.','Do NOT assess ice machines in the dining room or any requiring tools/ladder to access.','For lever and drain issues on Coke Freestyle, score 219 instead. For damaged but clean boards, score 119.'] },
            '119': { title: 'Food-Contact Surface Condition', video_url: '', overview: 'Everything assessed for cleanliness under 118 also gets assessed for CONDITION here. Condition scoring focuses on a specific set of high-wear equipment — the "Fab Five" that account for nearly all deductions.', procedure: ['Check FRY BASKETS — score if wires are disconnected from their starting point or if 5+ tack welds in a row are broken.','Check FRY SCOOPS — look for cracks where the handle meets the scoop.','Check KNIFE TIPS — inspect for broken or chipped tips.','Check SMALLWARE CORNERS — look for cracked corners on pans and "spider" cracks in the middle.','Check the FRY CUTTER — push block missing teeth, blades damaged or missing.','Show any damaged equipment to the manager and document the manager\'s name.'], scoring: '3 points — Critical. Cutting boards now assessed under 119a (no point value as of Q1 2026).', areas: [{ name: 'Fry Baskets', pct: '30%', products: 'Wire baskets at fry station', cause: 'Normal wear — disconnected wires from heavy daily use' },{ name: 'Fry Cutter / Push Block', pct: '25%', products: 'Potato cutter assembly', cause: 'Missing teeth or damaged blades — keep a fully assembled backup set ready' },{ name: 'Smallwares', pct: '25%', products: 'Pans, scoops, spatulas', cause: 'Cracked corners and spider cracks from heat cycling and drops' },{ name: 'Knives', pct: '20%', products: 'Prep knives', cause: 'Broken or chipped tips from misuse or improper storage' }], tips: ['Keep plenty of backup supplies — a fully assembled set of potato blades should always be ready.','Train crew to own equipment checks at their station: fry person checks baskets, prep checks knives.','Do NOT score fryer basket handles with minor nicks, bread rack trolley (vendor-maintained), or single-use plastic forks for relish.','Do NOT score baskets with wires that wrap continuously top-to-bottom if still connected.'] },
            '217': { title: 'Clean Utensil & Equipment Storage', video_url: '', overview: 'All clean utensils and equipment must be stored to prevent recontamination. Handles must point the same direction in horizontal storage or point up in buckets.', procedure: ['Check handles are all pointing the same direction in horizontal storage', 'Verify handles point up in buckets and containers', 'Check that inverted stacked items prevent dust and debris collection inside', 'Verify drawers and storage containers are themselves clean', 'Ensure items are not stacked while still wet', 'Check items are not nested so they cannot drip dry properly'], scoring: '1 point — Non-Critical.', tips: ['Exception: Bulk plastic silverware arrives packaged jumbled — do not score for that.', 'Score when handles are not facing properly when placed in active use.', 'Plastic fork used for relish is acceptable.'] },
            '218': { title: 'In-Use Utensil Handling', video_url: '', overview: 'All in-use utensils including ice scoops must be properly handled and stored. For moist products, handles must extend completely out and not touch the product.', procedure: ['Check ice scoop handle extends completely out of ice container', 'Verify scoop handle does not touch the ice or product', 'For non-PHF items in covered containers, check if scoops may be stored inside with handle extending out', 'Look for cups or bowls being misused as scoops', 'Check for utensils stored at room temperature in sanitizer containers', 'Verify proper handle positioning for all in-use utensils'], tips: ['Score for cups and bowls with no handles being used as scoops.', 'Score for utensils stored at room temperature in sanitizer.', 'Handles must completely extend out and not touch moist products.'] },
            '219': { title: 'Non-Food-Contact Surface Cleanliness', video_url: '', overview: 'All non-food-contact surfaces must be cleaned regularly. This is the #1 most commonly scored non-critical item system-wide with 1,240+ findings. The fryer area and cook line are the biggest problem spots.', procedure: ['Check sides of sinks for buildup and cleanliness.','Inspect cooler and freezer door gaskets — pull them back and look for black buildup.','Check sliding door tracks on ice machines.','Inspect exterior of ice machines and food containers.','Check on/off switches, handles, and equipment shelves.','Assess beverage machine drains AND lever areas for cleanliness (both required since Sept 2019).'], scoring: '1 point — Non-Critical.', areas: [{ name: 'Fryer Area', pct: '35%', products: 'Back/sides/wheels/interior cabinets/filter boxes', cause: 'Heavy grease and oil buildup from continuous frying — needs daily degreasing' },{ name: 'Cook Line Equipment', pct: '25%', products: 'Grill sides, prep tables, dressing station exteriors', cause: 'Encrusted debris on surfaces not part of regular 4-hour cleaning cycle' },{ name: 'Walk-in Cooler', pct: '20%', products: 'Gaskets, shelving, door handles, exterior panels', cause: 'Black mold buildup on gaskets — need weekly gasket wipe-down' },{ name: '3-Comp Sink Area', pct: '12%', products: 'Caulking, spray nozzles, sink sides', cause: 'Salt rust and lime scale buildup on fixtures' },{ name: 'Heat Lamps & Equipment', pct: '8%', products: 'Undersides of heat lamps, equipment wheels, casters', cause: 'Salt rust buildup — overlooked during routine cleaning' }], tips: ['Most items scored here must ALSO be scored on the appropriate MMCCA line item.','If shelving or containers holding clean utensils are soiled, score 217 instead.','For beverage machines: assess BOTH the drain AND the lever area — updated requirement.','Fryer filter boxes and interior cabinets are the most missed areas during closing clean.'] },
            '222': { title: 'Non-Food-Contact Surface Condition', video_url: '', overview: 'Non-food-contact surfaces must be made of safe, corrosion-resistant, nonabsorbent materials in good condition. This is the 5th most common non-critical finding system-wide (472+ findings).', procedure: ['Check cooler and freezer door gaskets for tears, warping, or degradation.','Inspect equipment handles, wheels, and casters for rust or corrosion.','Verify shelving is not warped, cracked, or corroded.','Check exterior panels for chipping paint, peeling coatings, or rust.','Inspect the 3-comp sink for damage.'], scoring: '1 point — Non-Critical.', areas: [{ name: 'Equipment Throughout', pct: '40%', products: 'Fryer exteriors, grill panels, cooler doors', cause: 'Aging equipment — rusted casters, hinges, and exterior panels' },{ name: 'Walk-in Cooler', pct: '25%', products: 'Door gaskets, shelving, interior panels', cause: 'Worn gaskets from constant opening — replace on a schedule' },{ name: 'Prep & Work Tables', pct: '20%', products: 'Table legs, shelving underneath, table edges', cause: 'Peeling coatings and chipped surfaces from daily heavy use' },{ name: '3-Comp Sink', pct: '15%', products: 'Drain boards, basin edges, plumbing fixtures', cause: 'Bent drain boards not shedding water — score damage here, not under 214' }], tips: ['Do NOT score fryer basket handles with minor nicks.','Do NOT score burn-resistant gloves or the bread rack trolley (vendor-maintained).','Score damage to warewashing sinks under item 214 instead.','Also score the appropriate MMCCA line item for non-food-contact surfaces not in good condition.'] },
            '224': { title: 'Sanitation Buckets & Test Strips', video_url: '', overview: 'At least TWO sanitation buckets must be in use: one on the line and one in prep area. Sanitizer test kits must be readily available (not wrapped or buried). Chlorine strips required for milkshake machine locations.', procedure: ['Verify at least two sanitation buckets are in use', 'Check one bucket is located on the line including front counter', 'Check one bucket is in the prep area', 'Verify test kit is open and readily accessible', 'Ensure test kit is not buried in a drawer or wrapped in foil', 'For milkshake machine locations, verify chlorine test strips are available', 'Check test kits are accessible to staff during all hours'], tips: ['Do NOT score for expired test strips.', 'Do NOT score if line sanitizer bucket is stored somewhere convenient but out of immediate view.', 'Test kits must be readily available for staff to use.', 'Chlorine strips required specifically for Kay-5 sanitizer locations.'] },
            '126': { title: 'Sewage & Grease Trap Systems', video_url: '', overview: 'If sewage is backing up, the location should close immediately. Check that all drains flow properly, grease traps are maintained on schedule, and there are no sewage odors or backups.', procedure: ['Walk the facility checking all drains for proper flow.','Check grease traps — are they maintained and cleaned on schedule?','Check for sewage odors or any signs of backup.','If backup is active, the location must close until resolved.'], scoring: '4 points — Critical.', tips: ['Avoid pouring grease or oil down drains — collect in containers for proper disposal.','Wipe greasy pans with paper towels before washing to minimize fat in the pipes.','Schedule regular grease trap cleanings.','Check drains weekly for slow flow and address early.'] },
            '130': { title: 'Pest Prevention', video_url: '', overview: 'Insects and rodents are always looking for food, water, and shelter. The specialist documents and scores ALL pest activity by type, number, location, and life stage (dead or alive).', procedure: ['Walk the entire restaurant looking for pest evidence — drains, soda machines, fryer area, storage areas, topping cart.','Document scoring triggers: fruit flies (5+ in a small area), active cockroaches or rodents (any number), fresh droppings (any amount), multiple fly life cycles, birds nesting near food, trailing ants (10+ in same area).','Check rodent traps — verify they have not been moved during floor cleaning. Holes should ALWAYS face the wall.','Verify bug lights are plugged in, turned on, and fully operational.'], scoring: '3 points — Critical.', areas: [{ name: 'Drains & Soda Machines', pct: '35%', products: 'Fruit flies congregating near moisture sources', cause: 'Drains not cleaned regularly — organic buildup attracts flies' },{ name: 'Fryer & Cooking Area', pct: '25%', products: 'Roaches drawn to grease and warmth', cause: 'Grease buildup in hard-to-reach areas behind equipment' },{ name: 'Storage & Walk-in', pct: '25%', products: 'Mice, droppings near stored food', cause: 'Entry points not sealed, food debris on floor' },{ name: 'Topping Cart & Line', pct: '15%', products: 'Ants trailing to exposed food areas', cause: 'Sweet product residue (strawberries, sauces) not cleaned thoroughly' }], tips: ['If pest activity is scored, call Five Guys Food Safety team immediately: Trey Williamson (703-606-5946), Sarah Alak (703-577-0720), Justin Kincaid (703-608-9195), or Tino Juarez (703-203-8357).','Then call the Steritech Account Manager.','Double check rodent traps after every floor cleaning — they get moved constantly.','Check regularly for pest entry points (gaps under doors, cracks in walls) and address immediately.'] },
            '111': { title: 'Receiving Temperatures', video_url: '', overview: 'If a delivery occurs during operating hours, every PHF must be temped upon receipt. Refrigerated foods must be 41°F or below. Ground beef must arrive between 28°F and 41°F.', procedure: ['If a delivery is in progress, temp every refrigerated PHF item.','Verify ground beef is between 28°F and 41°F.','Document any product outside the acceptable range.','Report temperature issues through FoodLogiq.'], scoring: '3 points — Critical.', tips: ['Most deliveries happen overnight — this item is only scored when a delivery happens during the assessment.','Be diligent about reporting temperature issues through FoodLogiq.','Ground beef has a tighter range (28–41°F) than other refrigerated items.'] },
            '113': { title: 'Cooking Temperatures', video_url: '', overview: 'All PHF must reach required internal temps: 160°F (US) / 71°C (Canada) / 75°C (Int\'l/JV). Rarely scored at Five Guys since all burgers are served well done — but don\'t overlook mushrooms.', procedure: ['Verify burger patties are cooked well done and juicy — this typically exceeds the minimum.','Check mushrooms: they must reach proper temp on the grill BEFORE being transferred to the hot holding unit.','Do NOT rely on the hot holding unit to raise mushroom temperature.'], scoring: '4 points — Critical.', tips: ['HACCP critical limits: beef and hot dogs must reach 165°F for 30 seconds. Vegetables and potatoes must reach 135°F for 30 seconds.','Stick to the script — if a customer pushes for a customized cook, we only serve well done and juicy.','Mushrooms are the most commonly missed item here — validate temp before moving to the hot well.'] },
            '113a': { title: 'Cooked Burger Patty Temp', video_url: '', overview: 'The specialist temps a finished burger at the grill the moment it is lifted with the spatula. Keep your back to the customer while quickly capturing the reading.', procedure: ['Wait for a burger to finish cooking.','Capture the temp at the grill the moment the spatula lifts the patty.','Keep your back to the customer during the reading for perception purposes.','Document the actual temperature reading.'], scoring: 'Informational — no points. Documents actual burger temp for trending.', tips: ['This is a temperature observation for trending and quality tracking.','Document the actual reading for the record.','If the burger temp indicates a cooking process failure, the auditor may reference item 103 or 114.'] },
            '114': { title: 'Food Left Out of Temp Control', video_url: '', overview: 'Food left out of temperature-controlled environments for roughly 30 minutes or more gets scored. The most common scenario: a prep table full of meat with nobody working on it. Stay on task during prep.', procedure: ['Observe the prep area — is any PHF sitting out unattended?','Check how long product has been at room temperature. Specialists use ~30 minutes as the threshold.','Identify the product: beef, cheese, bacon, and tomatoes are scored most frequently.','If product has been out too long, it cannot be returned to the cooler — it must be discarded or cooked immediately.'], scoring: '3 points — Critical.', areas: [{ name: 'Prep Table — Meat', pct: '40%', products: 'Ground beef, bacon', cause: 'Employee started prepping meat and got distracted with another task' },{ name: 'Prep Table — Cheese', pct: '25%', products: 'Blocks of cheese', cause: 'Cheese left on prep surface instead of staying in cooler until ready to break down' },{ name: 'Tomatoes', pct: '20%', products: 'Sliced tomatoes brought from walk-in', cause: 'Tomatoes brought to kitchen out of temp — check with thermometer before stocking the line' },{ name: 'Bacon', pct: '15%', products: 'Bacon during prep', cause: 'Stored on the heated table instead of kept in the drawer' }], tips: ['Keep bacon in the drawer during prep — never on the heated table.','Take a manual thermometer into the cooler and check tomato temps before stocking the line.','Never prep cheese directly into the container in the chef base — specialists will score this.','Store blocks of cheese in the cooler until you are ready to break them down. Don\'t leave them on the prep surface.'] },
            '124': { title: 'Sick Employee Exclusion', video_url: '', overview: 'Excluding sick employees is crucial to protect public health. This is the highest-value item on the audit. Do not directly question employees about illness — that can violate privacy laws.', procedure: ['Observe the team for signs of illness: vomiting, diarrhea, fever, severe coughing/sneezing, sore throat with fever, jaundice, open sores on hands/forearms, excessive nasal discharge.','Watch for indirect signs: bottles of medication, frequent restroom trips.','If concerns arise, bring them to the manager — have the manager speak with the employee privately.','Do NOT directly question employees about their illness.'], scoring: '4 points — Critical. Highest-value item on the entire audit.', tips: ['If this item is scored, immediately call Five Guys Food Safety: Trey Williamson (703-606-5946), Sarah Alak (703-577-0720), Justin Kincaid (703-608-9195), or Tino Juarez (703-203-8357).','Then call the Steritech Account Manager.','Leave a detailed voicemail if no answer, then call the next person on the list.'] },
            '128': { title: 'Approved Water Source', video_url: '', overview: 'Safe water from an approved source (municipal or tested private system) is essential for handwashing, cleaning, and food prep. Water must be free from bacteria, chemicals, and pollutants.', procedure: ['Verify water supply is from approved municipal source or tested private system', 'Check that adequate water pressure exists for washing dishes and cleaning', 'Confirm water is flowing to all food prep, handwash, and cleaning areas', 'Verify hot water availability where needed for sanitation', 'Ensure water quality has been tested if using private system'], scoring: '4 points — Critical.', tips: ['Without sufficient safe water, sanitation breaks down and all other audit items become irrelevant.', 'Check that hot water is flowing at adequate temperature in food prep and handwash areas.'] },
            '129': { title: 'Plumbing & Backflow Prevention', video_url: '', overview: 'Adequate water pressure and backflow prevention devices are critical. Air gaps and backflow prevention valves stop contaminated water from flowing back into the clean water supply.', procedure: ['Check water pressure is strong enough for washing dishes and running equipment', 'Verify air gaps (physical breaks between faucet and sink rim) exist where required', 'Inspect backflow prevention devices to ensure they are functioning', 'Confirm air gaps are at least one inch', 'Check that faucets and sprayers have proper backflow protection', 'Verify all drains and sewage lines are properly separated from fresh water supply'], scoring: '2 points — Critical.', tips: ['An air gap is a physical break between the faucet and sink rim.', 'A backflow device is a valve that only allows water to flow one direction.', 'Cross-connections between clean and dirty water lines must not exist.'] },
            '225': { title: 'Floors, Walls & Ceilings — Cleanliness', video_url: '', overview: 'Walk the entire facility checking structural surfaces for cleanliness. This is the #3 most common non-critical finding (932+ findings). Kitchen areas and ceiling fixtures are the biggest problem spots.', procedure: ['Walk the entire facility — every room, every corner.','Check under counters and prep tables for accumulated soil.','Inspect floor/wall junctions for dirt buildup.','Check floor drains for cleanliness and blockages.','Look behind and under equipment for soil.','Look UP — check ceiling tiles, light fixtures, and vents for dust and debris.','Score puddling water if not mopped or squeegeed to a drain immediately.'], scoring: '1 point — Non-Critical.', areas: [{ name: 'Kitchen / Cook Line', pct: '35%', products: 'Floors under fryers, behind grill, prep area walls', cause: 'Grease splatter and food debris not cleaned during shift — needs end-of-shift deep attention' },{ name: 'Ceiling & Light Fixtures', pct: '25%', products: 'Ceiling tiles, vent covers, light fixture covers', cause: 'Dust and grease film accumulation — overlooked because they are overhead' },{ name: 'Back of House', pct: '20%', products: 'Dry storage floors, mop sink area, office area', cause: 'Low traffic areas cleaned less frequently — add to weekly deep clean' },{ name: 'Walk-in Cooler', pct: '12%', products: 'Cooler floor, wall panels, shelving', cause: 'Condensation and product drips not cleaned after each use' },{ name: 'Dining Room', pct: '8%', products: 'Ceiling vents, baseboards, window tracks', cause: 'Guest-facing areas need daily attention to vents and trim' }], tips: ['For damaged floors, walls, or ceilings, score item 236 instead — this item is about cleanliness.','If floor beneath inverted milk crates used as shelving is soiled, score here.','Also score appropriate MMCCA items for structural cleanliness.'] },
