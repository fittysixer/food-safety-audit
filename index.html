        /* ===== STICKY SCORE TRACKER BAR ===== */
        function ScoreTracker({ scoringData, startTime }) {
            const pct = Math.round(scoringData.percentage);
            const crits = scoringData.criticalFindings;
            const nonCrits = scoringData.nonCriticalFindings;
            const scoreLevel = pct >= 96 ? 0 : pct >= 90 ? 1 : pct >= 85 ? 2 : 3;
            const critLevel = crits === 0 ? 0 : crits === 1 ? 1 : crits === 2 ? 2 : 3;
            const riskLevel = Math.max(scoreLevel, critLevel);
            const riskLabels = ['Low Risk', 'Med-Low', 'Med-High', 'High Risk'];
            const rating = riskLabels[riskLevel];
            const critColor = crits > 0 ? '#f87171' : 'rgba(255,255,255,0.6)';
            const nonCritColor = nonCrits > 0 ? '#fb923c' : 'rgba(255,255,255,0.6)';
            const scoreColor = pct >= 96 ? '#4ade80' : pct >= 90 ? '#facc15' : pct >= 85 ? '#fb923c' : '#f87171';

            const [elapsed, setElapsed] = useState('0:00');
            useEffect(() => {
                if (!startTime) return;
                const tick = () => {
                    const diff = Math.floor((Date.now() - startTime) / 1000);
                    const m = Math.floor(diff / 60);
                    const s = diff % 60;
                    setElapsed(`${m}:${s < 10 ? '0' : ''}${s}`);
                };
                tick();
                const iv = setInterval(tick, 1000);
                return () => clearInterval(iv);
            }, [startTime]);

            return (
                <div className="fg-score-tracker">
                    <div className="fg-score-tracker-inner">
                        {/* Five Guys text mark */}
                        <div className="fg-tracker-logo">
                            <div className="fg-tracker-logo-text" style={{display:'flex',alignItems:'center',gap:'8px'}}>
                                <span>FIVE GUYS</span>
                                <span style={{width:'1px',height:'14px',background:'rgba(255,255,255,0.15)',display:'inline-block'}}></span>
                                <span style={{fontSize:'10px',fontWeight:600,letterSpacing:'0.12em',color:'rgba(255,255,255,0.45)',fontFamily:'Inter, sans-serif'}}>FOOD SAFETY ASSESSMENT</span>
                            </div>
                        </div>

                        {/* Metrics — right-aligned */}
                        <div className="fg-tracker-metrics">
                            <div className="fg-timer-pill">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                {elapsed}
                            </div>
                            <div className="fg-tracker-pill pill-score">
                                <span className="tracker-label">Score</span>
                                <span className="tracker-value" style={{color: scoreColor}}>{pct}</span>
                            </div>
                            <div className="fg-tracker-divider"></div>
                            <div className="fg-tracker-pill">
                                <span className="tracker-label">Critical</span>
                                <span className="tracker-value" style={{color: critColor}}>{crits}</span>
                            </div>
                            <div className="fg-tracker-divider"></div>
                            <div className="fg-tracker-pill">
                                <span className="tracker-label">Non-Crit</span>
                                <span className="tracker-value" style={{color: nonCritColor}}>{nonCrits}</span>
                            </div>
                            {scoringData.mmccaTotal > 0 && (<>
                                <div className="fg-tracker-divider"></div>
                                <div className="fg-tracker-pill">
                                    <span className="tracker-label">MMCCA</span>
                                    <span className="tracker-value" style={{color: scoringData.mmccaFindings > 0 ? '#fb923c' : 'rgba(255,255,255,0.6)'}}>{scoringData.mmccaFindings}</span>
                                </div>
                            </>)}
                            <div className="fg-tracker-divider"></div>
                            <div className="fg-tracker-pill">
                                <span className="tracker-label">Risk</span>
                                <span className="tracker-value" style={{color:'#ffffff', fontSize:'11px'}}>{rating}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ===== MAIN APP ===== */
        function FoodSafetyAuditForm() {

            // FEATURE 7: Fetch trend data when entering a category

            }, [screen, expandedItem, setupData.store]);

            // FEATURE 13: Future Data Refresh Hook
            const refreshGuidanceData = async () => {
                // Future: fetch fresh area data from Supabase edge function

            const selectedStore = STORE_OPTIONS.find(s => s.id === setupData.store);
            const storeLabel = selectedStore ? `${selectedStore.id} — ${selectedStore.name}` : '';

            const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zaGdxZ3N3YWp0YW1td3dmeHZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQxMjYyMDQsImV4cCI6MjA1OTcwMjIwNH0.gDiMf23MJQxFPqxhMYBblQaS0MdDcBWRkUmtgLzKq_Y';
            const supaFetch = (path) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: { 'apikey': SUPA_ANON, 'Authorization': `Bearer ${SUPA_ANON}` } });

            // Fetch prior audit context for the selected store
            const loadPriorFindings = async (storeId) => {
                try {
                    // Get the most recent completed assessment for this store
                    const summaryRes = await supaFetch(`completed_assessments?location=eq.${storeId}&select=score,rating,date_started,total_findings,critical&order=created_at.desc&limit=1`);
                    if (summaryRes.ok) {

                    if (detailRes.ok) {

                        // Build a map: itemCode → { status, coached }
                        const itemMap = {};
                        details.forEach(d => {
                            if (!d.line_item_code || itemMap[d.line_item_code]) return; // first occurrence = most recent
                            const isNC = d.line_item_status === 'Not Compliant';
                            const wasCoached = isNC && parseFloat(d.points_scored || 0) === 0 && parseFloat(d.possible_points || 0) > 0;
                            itemMap[d.line_item_code] = { status: d.line_item_status, coached: wasCoached };
                        });
                        setPriorFindings(prev => ({...(prev || {}), items: itemMap}));

                } catch (e) {

                    setPriorFindings({ items: {}, summary: null });
                }
                // FEATURE 13: Call refresh guidance data at assessment start
                await refreshGuidanceData();
            };

            // Check if an item code is a repeat from prior audit
            const isRepeatFromPrior = (itemCode) => {
                if (!priorFindings || !priorFindings.items) return false;
                const prior = priorFindings.items[itemCode];
                return prior && prior.status === 'Not Compliant' && !prior.coached;
            };

            // Check if an item was coached in prior audit
            const wasCoachedPrior = (itemCode) => {
                if (!priorFindings || !priorFindings.items) return false;
                const prior = priorFindings.items[itemCode];
                return prior && prior.coached;
            };

            // Get prior item info
            const getPriorItem = (itemCode) => {
                if (!priorFindings || !priorFindings.items) return null;
                return priorFindings.items[itemCode] || null;
            };

            const scoringData = useMemo(() => {
                let totalPoints = 0, totalDeductions = 0, criticalFindings = 0, nonCriticalFindings = 0, coachedCount = 0, repeatCount = 0, naCount = 0, mmccaFindings = 0, mmccaTotal = 0;
                allCategories.forEach(cat => {
                    cat.items.forEach(item => {
                        if (item.risk === 'INFO_ONLY') return;
                        const key = `${cat.id}_${item.code}`;

                        // MMCCA items — counted separately, no FSA point deductions
                        if (item.risk === 'MMCCA') {
                            mmccaTotal++;
                            if (assessmentScores[key] === 'NOT_COMPLIANT') {
                                const isCoached = coachedNotes[key]?.coached;
                                if (isCoached) { coachedCount++; } else { mmccaFindings++; }
                            }
                            return;
                        }

                        // FSA items — standard scoring
                        if (assessmentScores[key] === 'NA') { naCount++; return; }
                        totalPoints += item.points;
                        if (assessmentScores[key] === 'NOT_COMPLIANT') {
                            const isCoached = coachedNotes[key]?.coached;
                            if (isCoached) {
                                coachedCount++;
                            } else {
                                let ded = 0;
                                const autoRepeat = isRepeatFromPrior(item.code);
                                if (item.code === '101' && item101Observations[key]) {
                                    item101Observations[key].forEach(obs => {
                                        (obs.products || []).forEach(p => {
                                            const t = parseFloat(p.temp) || 0;
                                            if (t > 50) ded += 5;
                                            else if (t >= 42) ded += 3;
                                        });
                                    });
                                    if (autoRepeat) ded += 1;
                                    ded = Math.min(ded, 10);
                                } else if (item.code === '103' && multiObs[key] && multiObs[key].some(o => o.temp)) {
                                    multiObs[key].forEach(obs => {
                                        const t = parseFloat(obs.temp) || 0;
                                        if (t > 0 && t < 130) ded += 5;
                                        else if (t >= 130 && t < 140) ded += 3;
                                    });
                                    if (ded === 0) ded = item.points;
                                    if (autoRepeat) ded += 1;
                                    ded = Math.min(ded, 10);
                                } else {
                                    ded = item.points;
                                    if (autoRepeat) ded += 1;
                                }
                                if (autoRepeat) repeatCount++;
                                totalDeductions += ded;
                                if (item.risk === 'CRITICAL') criticalFindings++; else nonCriticalFindings++;
                            }
                        }
                    });
                });
                const finalScore = Math.max(0, 100 - totalDeductions);
                const percentage = finalScore; // Score IS the number out of 100, not a calculated percentage
                return { totalPoints, totalDeductions, finalScore, percentage, criticalFindings, nonCriticalFindings, totalFindings: criticalFindings + nonCriticalFindings, coachedCount, repeatCount, naCount, mmccaFindings, mmccaTotal };
            }, [assessmentScores, item101Observations, coachedNotes, priorFindings, multiObs, allCategories]);

            const categoryProgress = useMemo(() => {

            const handleItemScore = (itemKey, score) => {

                allCategories.forEach(cat => {

                        if (item.risk === 'INFO_ONLY') return;
                        const k = `${cat.id}_${item.code}`;
                        if (!assessmentScores[k]) unscored.push({ code: item.code, title: item.title, category: cat.name, catId: cat.id });

                return unscored;

            const handleCompleteAssessment = () => {

                if (unscored.length > 0) {
                    setShowCompletionWarning(true);

                    setScreen('complete');
                }

            const forceComplete = () => {
                setShowCompletionWarning(false);
                setScreen('complete');

            // Official Five Guys risk rating: whichever trigger is WORSE wins
            // Score: Low=100-96, ML=95-90, MH=89-85, High=84 or lower
            // Criticals: Low=0, ML=1, MH=2, High=3+
            const getRiskLevel = (pct, criticals) => {
                const scoreLevel = pct >= 96 ? 0 : pct >= 90 ? 1 : pct >= 85 ? 2 : 3;
                const critLevel = criticals === 0 ? 0 : criticals === 1 ? 1 : criticals === 2 ? 2 : 3;
                return Math.max(scoreLevel, critLevel); // worse of the two
            };
            const RISK_LABELS = ['Low Risk', 'Medium-Low Risk', 'Medium-High Risk', 'High Risk'];
            const RISK_ABBREVS = ['L', 'ML', 'MH', 'H'];
            const RISK_COLORS = ['#ffffff', '#ffffff', '#ffffff', '#ffffff'];
            const getRatingText = (pct, crits) => RISK_LABELS[getRiskLevel(pct, crits)];
            const getRatingAbbrev = (pct, crits) => RISK_ABBREVS[getRiskLevel(pct, crits)];
            const getRatingColor = (pct, crits) => getRiskLevel(pct, crits) <= 1 ? 'text-white' : getRiskLevel(pct, crits) === 2 ? 'text-yellow-400' : 'text-red-400';
            const getRatingBg = (pct, crits) => getRiskLevel(pct, crits) <= 2 ? 'rgba(255,255,255,0.06)' : 'rgba(var(--fg-red-rgb),0.08)';

            /* ===================== SETUP SCREEN ===================== */
            if (screen === 'setup') {

                                </div>

                                {/* Store Context from Prior Audit */}
                                {storePreview && (
                                    <div className="mb-5 p-4 rounded-xl anim-fade-slide" style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)'}}>
                                        <p className="text-xs font-bold text-gray-500 heading-spaced mb-2">LAST AUDIT — {storePreview.date_started ? new Date(storePreview.date_started).toLocaleDateString() : 'Unknown'}</p>

                                                <p className="text-2xl font-bold text-white" style={{fontFamily:'Outfit'}}>{storePreview.score != null ? Math.round(storePreview.score) + '%' : '—'}</p>

                                            <div className="flex gap-4">
                                                <div><p className="text-sm font-bold text-white">{storePreview.total_findings ?? '—'}</p><p className="text-xs text-gray-500">Findings</p></div>
                                                <div><p className="text-sm font-bold" style={{color: (storePreview.critical||0) > 0 ? '#f87171' : 'white'}}>{storePreview.critical ?? '—'}</p><p className="text-xs text-gray-500">Criticals</p></div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <button onClick={handleBeginAssessment} disabled={!isReady} className="fg-btn-primary">
                                    BEGIN ASSESSMENT
                                </button>

                                {hasDraft && (
                                    <button onClick={handleResumeDraft} className="mt-3 w-full py-3 px-4 rounded-xl text-sm font-semibold transition" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', cursor:'pointer'}}
                                        onMouseEnter={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.25)'} onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.1)'}>
                                        Resume Draft Assessment
                                    </button>
                                )}

                                {/* FEATURE 11: Multi-Store Comparison Placeholder */}
                                <button onClick={() => alert('Multi-store comparison coming soon — connect your Supabase dashboard to unlock')} className="mt-3 w-full py-3 px-4 rounded-xl text-sm font-semibold transition" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', cursor:'pointer'}}
                                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.25)'} onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.1)'}>
                                    Compare Stores
                                </button>

                                {/* Demo links — Leave Behind Report & Assessment Email */}
                                <a href="https://fsagent-modular.vercel.app/leave-behind-report.html" target="_blank" rel="noopener noreferrer" className="mt-3 w-full py-3 px-4 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', cursor:'pointer', textDecoration:'none', display:'flex'}}
                                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.25)'} onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.1)'}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                    Leave Behind Report
                                </a>

                                <a href="https://fsagent-modular.vercel.app/assessment-email-template.html" target="_blank" rel="noopener noreferrer" className="mt-3 w-full py-3 px-4 rounded-xl text-sm font-semibold transition flex items-center justify-center gap-2" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.6)', cursor:'pointer', textDecoration:'none', display:'flex'}}
                                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.25)'} onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.1)'}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                    Completed Assessment Email
                                </a>
                            </div>
                        </div>
                    </div>
                );
            }

            /* ===================== PRE-AUDIT AI BRIEFING SCREEN ===================== */
            if (screen === 'briefing') {
                const summary = priorFindings?.summary;
                const items = priorFindings?.items || {};
                const ncItems = Object.entries(items).filter(([,v]) => v.status === 'Not Compliant');
                const coachedItems = ncItems.filter(([,v]) => v.coached);
                const findingItems = ncItems.filter(([,v]) => !v.coached);

                // Build category breakdown from prior findings
                const priorCatBreakdown = {};
                ncItems.forEach(([code]) => {
                    allCategories.forEach(cat => {
                        const found = cat.items.find(i => i.code === code);
                        if (found) {
                            if (!priorCatBreakdown[cat.name]) priorCatBreakdown[cat.name] = { findings: 0, coached: 0, criticals: 0 };
                            const info = items[code];
                            if (info.coached) priorCatBreakdown[cat.name].coached++;
                            else {
                                priorCatBreakdown[cat.name].findings++;
                                if (found.risk === 'CRITICAL') priorCatBreakdown[cat.name].criticals++;
                            }
                        }
                    });
                });

                // Find items that were coached last time — these need extra attention
                const watchList = coachedItems.map(([code]) => {
                    let itemData = null;
                    allCategories.forEach(cat => {
                        const found = cat.items.find(i => i.code === code);
                        if (found) itemData = { ...found, category: cat.name };
                    });
                    return itemData;
                }).filter(Boolean);

                // Find repeat risk items (NC but not coached — if NC again it's a repeat)
                const repeatRiskList = findingItems.map(([code]) => {
                    let itemData = null;
                    allCategories.forEach(cat => {
                        const found = cat.items.find(i => i.code === code);
                        if (found) itemData = { ...found, category: cat.name };
                    });
                    return itemData;
                }).filter(Boolean);

                const hasPriorData = summary || ncItems.length > 0;

                return (
                    <div className="min-h-screen p-4 md:p-8 flex items-center justify-center relative" style={{zIndex:1}}>

                            <div className="text-center mb-6 anim-fade">
                                <LogoLockup size="sm" />
                                <p className="text-gray-500 text-sm mt-3">{storeLabel} &bull; {setupData.assessmentDate}</p>
                            </div>

                            <div className="fg-insight-card mb-6 anim-fade-slide anim-delay-1">
                                <div className="fg-insight-glow"></div>
                                <div className="relative">
                                    <div className="flex items-center gap-2 mb-4">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--fg-red)" strokeWidth="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                                        <h2 className="text-lg font-bold text-white" style={{fontFamily:'Outfit'}}>AI Pre-Audit Briefing</h2>
                                    </div>

                                    {!hasPriorData ? (
                                        <div className="text-center py-6">
                                            <p className="text-gray-400 text-sm mb-2">No prior audit data found for this store.</p>
                                            <p className="text-gray-500 text-xs">This appears to be the first assessment — or data hasn't been loaded yet. All items start fresh.</p>
                                        </div>
                                    ) : (
                                        <React.Fragment>
                                            {/* Prior Score Summary */}
                                            {summary && (
                                                <div className="p-4 rounded-xl mb-4" style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)'}}>
                                                    <p className="text-xs font-bold text-gray-500 heading-spaced mb-3">LAST ASSESSMENT RESULTS</p>
                                                    <div className="flex items-center gap-6">
                                                        <div><p className="text-3xl font-bold text-white" style={{fontFamily:'Outfit'}}>{summary.score != null ? Math.round(summary.score) + '%' : '—'}</p><p className="text-xs text-gray-500 mt-1">{summary.rating || '—'}</p></div>
                                                        <div style={{width:'1px',height:'40px',background:'rgba(255,255,255,0.08)'}}></div>
                                                        <div className="flex gap-6">
                                                            <div><p className="text-lg font-bold text-white">{summary.total_findings ?? '—'}</p><p className="text-xs text-gray-500">Findings</p></div>
                                                            <div><p className="text-lg font-bold" style={{color:(summary.critical||0)>0?'#f87171':'white'}}>{summary.critical ?? '—'}</p><p className="text-xs text-gray-500">Criticals</p></div>
                                                            <div><p className="text-lg font-bold text-white">{coachedItems.length}</p><p className="text-xs text-gray-500">Coached</p></div>
                                                        </div>
                                                    </div>
                                                    {summary.date_started && <p className="text-gray-600 text-xs mt-2">Assessed: {new Date(summary.date_started).toLocaleDateString()}</p>}
                                                </div>
                                            )}

                                            {/* Category Breakdown */}
                                            {Object.keys(priorCatBreakdown).length > 0 && (
                                                <div className="mb-4">
                                                    <p className="text-xs font-bold text-gray-500 heading-spaced mb-2">AREAS OF CONCERN</p>
                                                    <div className="space-y-2">
                                                        {Object.entries(priorCatBreakdown).map(([name, data]) => (
                                                            <div key={name} className="flex items-center justify-between p-2 rounded-lg" style={{background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.05)'}}>
                                                                <span className="text-sm text-gray-300">{name}</span>
                                                                <div className="flex gap-3 text-xs">
                                                                    {data.findings > 0 && <span style={{color:'#f87171'}}>{data.findings} finding{data.findings>1?'s':''}</span>}
                                                                    {data.criticals > 0 && <span style={{color:'#f87171'}}>({data.criticals} critical)</span>}
                                                                    {data.coached > 0 && <span style={{color:'#fb923c'}}>{data.coached} coached</span>}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Watch List — Previously Coached */}
                                            {watchList.length > 0 && (
                                                <div className="p-4 rounded-xl mb-4" style={{background:'rgba(251,146,60,0.04)', border:'1px solid rgba(251,146,60,0.15)'}}>
                                                    <div className="flex items-center gap-2 mb-3">
                                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fb923c" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                                        <p className="text-sm font-bold" style={{color:'#fb923c'}}>Watch List — Previously Coached</p>
                                                    </div>
                                                    <p className="text-xs text-gray-400 mb-3">These items were coached last time. If they come up again, don't let the team slide twice.</p>
                                                    <div className="space-y-1.5">
                                                        {watchList.map(item => (
                                                            <div key={item.code} className="flex items-center gap-2">
                                                                <span className="fg-badge fg-badge-code" style={{fontSize:'10px'}}>{item.code}</span>
                                                                <span className="text-xs text-gray-300">{item.title}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Repeat Risk Items — Were NC last time */}
                                            {repeatRiskList.length > 0 && (
                                                <div className="p-4 rounded-xl mb-4" style={{background:'rgba(var(--fg-red-rgb),0.04)', border:'1px solid rgba(var(--fg-red-rgb),0.15)'}}>
                                                    <div className="flex items-center gap-2 mb-3">
                                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                                        <p className="text-sm font-bold" style={{color:'#f87171'}}>Repeat Risk — Found Last Time</p>
                                                    </div>
                                                    <p className="text-xs text-gray-400 mb-3">These items were Not Compliant on the last audit. If found again, they carry a +1 point repeat penalty.</p>
                                                    <div className="space-y-1.5">
                                                        {repeatRiskList.map(item => (
                                                            <div key={item.code} className="flex items-center gap-2">
                                                                <span className="fg-badge fg-badge-code" style={{fontSize:'10px'}}>{item.code}</span>
                                                                {item.risk === 'CRITICAL' && <span className="fg-badge fg-badge-critical" style={{fontSize:'10px',padding:'2px 7px'}}>CRIT</span>}
                                                                <span className="text-xs text-gray-300">{item.title}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </React.Fragment>
                                    )}
                                </div>
                            </div>

                            <button onClick={() => setScreen('hub')} className="fg-btn-primary anim-fade anim-delay-3">
                                BEGIN ASSESSMENT
                            </button>
                        </div>
                    </div>
                );
            }

            /* ===================== HUB SCREEN ===================== */
            if (screen === 'hub') {
                return (
                    <div className="min-h-screen relative" style={{zIndex:1}}>
                        <ScoreTracker scoringData={scoringData} startTime={startTime} />
                        <div className="p-4 md:p-8">
                        <div className="max-w-5xl mx-auto">
                            {/* Back to Setup */}
                            <button onClick={() => { if (confirm('Return to setup? Your progress will be saved as a draft.')) setScreen('setup'); }} className="mb-4 flex items-center gap-2 text-sm font-semibold transition no-print"
                                style={{color:'rgba(255,255,255,0.4)', background:'none', border:'none', cursor:'pointer', fontFamily:'DM Sans, sans-serif', padding:0}}
                                onMouseEnter={e => e.currentTarget.style.color='rgba(255,255,255,0.7)'}
                                onMouseLeave={e => e.currentTarget.style.color='rgba(255,255,255,0.4)'}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                                Exit Assessment
                            </button>
                            {/* Header */}
                            <div className="text-center mb-2 anim-fade">
                                <LogoLockup size="sm" />
                            </div>
                            <p className="text-center text-gray-500 text-sm mb-6 anim-fade anim-delay-1">
                                {setupData.specialistName} &bull; {storeLabel} &bull; {setupData.assessmentDate}
                            </p>

                            {/* Stat Cards */}
                            <div className={`grid grid-cols-3 gap-3 mb-8 ${includeMMCCA ? 'md:grid-cols-6' : 'md:grid-cols-5'}`}>
                                {[
                                    { label: 'ROUND', value: currentRound, color: 'text-white' },

                                                                    )}
                                                                    <div>
                                                                        <div className="flex items-center justify-between mb-1">
                                                                            <label className="block text-gray-400 text-xs">Notes</label>
                                                                            <VoiceNotesButton value={obs.notes||''} onChange={v => update101Obs(oi,'notes',v)} />
                                                                        </div>
                                                                        <textarea value={obs.notes||''} onChange={e => update101Obs(oi,'notes',e.target.value)} placeholder="Additional notes..." className="fg-input text-sm" rows="2" style={{resize:'none'}} />
                                                                    </div>
                                                                    <PhotoCapture
                                                                        photos={photos[`${itemKey}_obs${oi}`] || []}
                                                                        onPhotosChange={p => setPhotos({...photos, [`${itemKey}_obs${oi}`]: p})}
                                                                    />
                                                                </div>
                                                            ))}
                                                            {/* Validation check for 101 observations */}
                                                            {obs101.some(o => !o.location || !o.rootCause || (o.products||[]).some(p => !p.name || !p.temp)) && (
                                                                <div className="flex items-center gap-2 mt-3 px-2 py-1.5 rounded-lg" style={{background:'rgba(251,191,36,0.06)', border:'1px solid rgba(251,191,36,0.15)'}}>
                                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                                                                    <span className="text-xs" style={{color:'#fbbf24'}}>Some observations are incomplete — fill in location, products, temps, and root cause</span>
                                                                </div>
                                                            )}
                                                            {/* Photo nudge */}
                                                            {obs101.every((_,oi) => !photos[`${itemKey}_obs${oi}`] || photos[`${itemKey}_obs${oi}`].length === 0) && (
                                                                <div className="flex items-center gap-2 mt-2 px-2 py-1" style={{color:'rgba(251,191,36,0.7)'}}>
                                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                                                    <span className="text-xs">Photo recommended — capture evidence of temperature readings</span>
                                                                </div>
                                                            )}
                                                            <button onClick={add101Obs} className="mt-3 text-xs font-semibold py-2 px-4 rounded-lg" style={{background:'rgba(255,255,255,0.06)', color:'rgba(255,255,255,0.7)', border:'1px solid rgba(255,255,255,0.12)'}}>
                                                                + Add Another Unit
                                                            </button>
                                                            <p className="text-red-400 text-xs font-bold mt-2">Total Deduction: -{calc101Ded()} pts (max 10)</p>
                                                        </div>
                                                    )}

                                                    {/* NOT COMPLIANT — multi-observation items (Tier 1 + Tier 2) */}
                                                    {score === 'NOT_COMPLIANT' && !is101 && !coachedNotes[itemKey]?.coached && MULTI_OBS_CONFIG[item.code] && (
                                                        <MultiObsForm
                                                            config={MULTI_OBS_CONFIG[item.code]}
                                                            itemKey={itemKey}
                                                            observations={multiObs[itemKey]}
                                                            onChange={obs => setMultiObs({...multiObs, [itemKey]: obs})}
                                                            rootCauses={ROOT_CAUSES[category.id] || []}
                                                            isRepeat={isRepeatFromPrior(item.code)}
                                                            itemPoints={item.points}
                                                            photos={photos}
                                                            onPhotosChange={setPhotos}
                                                        />
                                                    )}

                                                    {/* NOT COMPLIANT — MMCCA simple: notes + photo only */}
                                                    {score === 'NOT_COMPLIANT' && item.risk === 'MMCCA' && (
                                                        <div className="mt-3 p-3 rounded-lg anim-fade-slide" style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderLeft:'3px solid var(--fg-red)'}}>
                                                            <div className="flex items-center justify-between mb-1.5">
                                                                <label className="block text-gray-400 text-xs font-semibold">Notes</label>
                                                                <VoiceNotesButton value={itemNotes[itemKey] || ''} onChange={v => setItemNotes({...itemNotes, [itemKey]: v})} />
                                                            </div>
                                                            <textarea placeholder="Describe the issue..." value={itemNotes[itemKey] || ''} onChange={e => setItemNotes({...itemNotes, [itemKey]: e.target.value})}
                                                                className="fg-input text-sm mb-3" rows="2" style={{resize:'none'}} />
                                                            <div className="mt-1">
                                                                {(!photos[itemKey] || photos[itemKey].length === 0) && (
                                                                    <p className="text-xs mb-1" style={{color:'rgba(251,191,36,0.7)'}}>
                                                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{display:'inline',verticalAlign:'middle',marginRight:'4px'}}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                                                        Photo recommended for documentation
                                                                    </p>
                                                                )}
                                                                <PhotoCapture
                                                                    photos={photos[itemKey] || []}
                                                                    onPhotosChange={p => setPhotos({...photos, [itemKey]: p})}
                                                                />
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* NOT COMPLIANT — generic (items without multi-obs config, excludes MMCCA) */}
                                                    {score === 'NOT_COMPLIANT' && !is101 && item.risk !== 'MMCCA' && !coachedNotes[itemKey]?.coached && !MULTI_OBS_CONFIG[item.code] && (() => {
                                                        const catRoots = ROOT_CAUSES[category.id] || [];
                                                        const det = ncDetails[itemKey] || {};
                                                        const updateDet = (field, val) => setNcDetails({...ncDetails, [itemKey]: {...det, [field]: val}});
                                                        const hasObsType = RANKED.observations[item.code];
                                                        const missingFields = !det.rootCause || (hasObsType ? !det.observationType : !itemNotes[itemKey]);
                                                        return (
                                                        <div className="mt-3 p-3 rounded-lg anim-fade-slide" style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderLeft:'3px solid var(--fg-red)'}}>
                                                            {/* Ambient temp capture for 101a-101d */}
                                                            {isAmbient && (
                                                                <div className="mb-3 p-2 rounded-lg" style={{background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.06)'}}>
                                                                    <div style={{maxWidth:'200px'}}>
                                                                        <label className="block text-gray-400 text-xs font-semibold mb-1">Ambient Temp (°F)</label>
                                                                        <input type="text" inputMode="decimal" value={det.ambientTemp||''} onChange={e => updateDet('ambientTemp', e.target.value)} placeholder="e.g. 44.5" className="fg-input text-sm" />
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {/* Validation hint */}
                                                            {missingFields && (
                                                                <div className="flex items-center gap-2 mb-3 px-2 py-1.5 rounded-lg" style={{background:'rgba(251,191,36,0.06)', border:'1px solid rgba(251,191,36,0.15)'}}>
                                                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                                                                    <span className="text-xs" style={{color:'#fbbf24'}}>Fill in observation and root cause to complete this finding</span>
                                                                </div>
                                                            )}

                                                            {/* Observation type — system-ranked picklist when available */}
                                                            {RANKED.observations[item.code] && (
                                                                <div className="mb-3">
                                                                    <label className="block text-gray-400 text-xs font-semibold mb-1.5">What Was Observed</label>
                                                                    <SearchableSelect
                                                                        value={det.observationType || ''}
                                                                        onChange={v => {
                                                                            updateDet('observationType', v);
                                                                            if (v && v !== 'OTHER' && !itemNotes[itemKey]) setItemNotes({...itemNotes, [itemKey]: v});
                                                                        }}
                                                                        placeholder="Most common issues first..."
                                                                        options={[...RANKED.observations[item.code], {label:'Other (describe below)', value:'OTHER'}]}
                                                                    />
                                                                </div>
                                                            )}

                                                            <div className="flex items-center justify-between mb-1.5">
                                                                <label className="block text-gray-400 text-xs font-semibold">Additional Notes</label>
                                                                <VoiceNotesButton value={itemNotes[itemKey] || ''} onChange={v => setItemNotes({...itemNotes, [itemKey]: v})} />
                                                            </div>
                                                            <textarea placeholder={RANKED.observations[item.code] ? "Add details or context..." : "Document what you observed..."} value={itemNotes[itemKey] || ''} onChange={e => setItemNotes({...itemNotes, [itemKey]: e.target.value})}
                                                                className="fg-input text-sm mb-3" rows="2" style={{resize:'none'}} />

                                                            {/* Root Cause */}
                                                            <label className="block text-gray-400 text-xs font-semibold mb-1.5">Root Cause</label>
                                                            {/* FEATURE 9: AI Root Cause Suggestions */}
                                                            {(() => {
                                                                const guidance = ITEM_GUIDANCE[item.code];
                                                                const suggestions = guidance && guidance.areas ? guidance.areas.map(a => ({ label: a.cause || a.name, value: a.cause || a.name })) : [];
                                                                return suggestions.length > 0 ? (
                                                                    <div className="mb-2">
                                                                        <p className="text-xs text-gray-500 mb-1.5">Suggested root causes:</p>
                                                                        <div className="flex flex-wrap gap-1.5 mb-2">
                                                                            {suggestions.slice(0, 3).map((sugg, si) => (
                                                                                <button key={si} onClick={() => updateDet('rootCause', sugg.value)}
                                                                                    className="text-xs py-1 px-2.5 rounded-full font-semibold"
                                                                                    style={{background:det.rootCause === sugg.value ? 'var(--fg-red)' : 'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.1)', color:det.rootCause === sugg.value ? 'white' : 'rgba(255,255,255,0.6)', cursor:'pointer'}}>
                                                                                    {sugg.label.substring(0, 30)}</button>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                ) : null;
                                                            })()}
                                                            <SearchableSelect
                                                                value={det.rootCause || ''}
                                                                onChange={v => updateDet('rootCause', v)}
                                                                placeholder="What caused this issue?"
                                                                options={[...catRoots, {label:'Other (type below)', value:'OTHER'}]}
                                                            />
                                                            {det.rootCause === 'OTHER' && (
                                                                <input type="text" value={det.rootCauseOther||''} onChange={e => updateDet('rootCauseOther', e.target.value)} placeholder="Describe root cause..." className="fg-input text-sm mt-1" />
                                                            )}

                                                            {isRepeatFromPrior(item.code) && (
                                                                <div className="flex items-center gap-2 mt-3 px-2 py-1.5 rounded-lg" style={{background:'rgba(var(--fg-red-rgb),0.08)', border:'1px solid rgba(var(--fg-red-rgb),0.2)'}}>
                                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f87171" strokeWidth="2"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                                                    <span className="text-xs font-semibold" style={{color:'#f87171'}}>Repeat Finding — flagged from prior audit (+1 pt)</span>
                                                                </div>
                                                            )}
                                                            <p className="text-gray-500 text-xs mt-2">
                                                                Deduction: {item.points}{isRepeatFromPrior(item.code) ? ` + 1 repeat = ${item.points + 1} pts` : ' pts'}
                                                            </p>

                                                            {/* Photo — nudge for NC */}
                                                            <div className="mt-3">
                                                                {(!photos[itemKey] || photos[itemKey].length === 0) && (
                                                                    <p className="text-xs mb-1" style={{color:'rgba(251,191,36,0.7)'}}>
                                                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{display:'inline',verticalAlign:'middle',marginRight:'4px'}}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                                                        Photo recommended for documentation
                                                                    </p>
                                                                )}
                                                                <PhotoCapture
                                                                    photos={photos[itemKey] || []}
                                                                    onPhotosChange={p => setPhotos({...photos, [itemKey]: p})}
                                                                />
                                                            </div>
                                                        </div>
                                                        );
                                                    })()}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Floating Next Unscored Button */}
                            {(() => {
                                const scorableItems = category.items.filter(i => i.risk !== 'INFO_ONLY');
                                const nextUnscored = scorableItems.find(i => !assessmentScores[`${category.id}_${i.code}`]);
                                if (!nextUnscored) return null;
                                const nextKey = `${category.id}_${nextUnscored.code}`;
                                return (
                                    <button className="fg-float-btn no-print" onClick={() => {
                                        const el = document.getElementById(`item-${nextKey}`);
                                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    }}>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                                        Next Unscored ({nextUnscored.code})
                                    </button>
                                );
                            })()}
                            {/* Quick Jump FAB — left side, complements Next Unscored on right */}
                            <button className="fg-float-btn no-print" onClick={() => setQuickAddOpen(true)} style={{bottom:'24px',left:'24px',right:'auto'}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
                                Quick Jump
                            </button>

                            {/* FEATURE 6: Floating Observation Timer */}
                            {obsTimer.running && obsTimer.itemKey && (
                                <div className="no-print" style={{position:'fixed',bottom:'24px',right:'24px',background:'rgba(196,18,48,0.9)',border:'1px solid rgba(196,18,48,1)',color:'white',padding:'12px 16px',borderRadius:'20px',fontSize:'14px',fontWeight:'bold',display:'flex',alignItems:'center',gap:'8px',zIndex:40,boxShadow:'0 4px 12px rgba(196,18,48,0.3)'}}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                    <span>{String(Math.floor(obsTimer.seconds / 60)).padStart(2, '0')}:{String(obsTimer.seconds % 60).padStart(2, '0')}</span>
                                </div>
                            )}
                            <QuickAddPanel
                                isOpen={quickAddOpen}
                                onClose={() => setQuickAddOpen(false)}
                                assessmentScores={assessmentScores}
                                includeMMCCA={includeMMCCA}
                                onJump={(catId, code) => { setExpandedItem(catId); setTimeout(() => { const el = document.getElementById(`item-${catId}_${code}`); if (el) el.scrollIntoView({behavior:'smooth', block:'center'}); }, 300); }}
                            />

                            {/* FEATURE 1: Completion Validation Warning Modal */}
                            {showCompletionWarning && (() => {
                                const unscored = getUnscoredItems();
                                return (
                                    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
                                        <div className="fg-card-flat p-6 max-w-md anim-fade-slide" style={{borderLeft:'4px solid var(--fg-red)'}}>
                                            <h3 className="text-lg font-bold text-white mb-2">Unscored Items</h3>
                                            <p className="text-gray-400 text-sm mb-4">The following items haven't been scored yet. Continue scoring or complete anyway?</p>
                                            <div className="space-y-2 mb-6 max-h-64 overflow-y-auto">
                                                {unscored.map((item, i) => (
                                                    <div key={i} className="p-2 rounded text-sm" style={{background:'rgba(255,255,255,0.03)'}}>
                                                        <span className="fg-badge fg-badge-code">{item.code}</span>
                                                        <p className="text-gray-300 mt-1">{item.title}</p>
                                                        <p className="text-xs text-gray-500">{item.category}</p>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => setShowCompletionWarning(false)} className="flex-1 py-2 px-4 rounded-lg text-sm font-semibold" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.12)', color:'rgba(255,255,255,0.7)', cursor:'pointer'}}>
                                                    Go Back
                                                </button>
                                                <button onClick={forceComplete} className="flex-1 py-2 px-4 rounded-lg text-sm font-semibold text-white" style={{background:'var(--fg-red)', border:'1px solid var(--fg-red)', cursor:'pointer'}}>
                                                    Complete Anyway
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                        </div>
                    </div>
                );
            }

            /* ===================== COMPLETE SCREEN ===================== */
            if (screen === 'complete') {
                const findings = [];
                const coachedFindings = [];
                allCategories.forEach(cat => {
                    cat.items.forEach(item => {
                        const k = `${cat.id}_${item.code}`;
                        if (assessmentScores[k] === 'NOT_COMPLIANT') {
                            const isCoached = coachedNotes[k]?.coached;
                            if (isCoached) {
                                coachedFindings.push({ code: item.code, title: item.title, category: cat.name,
                                    observation: coachedNotes[k]?.observation || '', coaching: coachedNotes[k]?.coaching || '' });
                            } else {
                                let ded = 0;
                                const autoRepeat = isRepeatFromPrior(item.code);
                                if (item.code === '101' && item101Observations[k]) {
                                    item101Observations[k].forEach(obs => {
                                        (obs.products || []).forEach(p => {
                                            const t = parseFloat(p.temp) || 0;
                                            if (t > 50) ded += 5;
                                            else if (t >= 42) ded += 3;
                                        });
                                    });
                                    if (autoRepeat) ded += 1;
                                    ded = Math.min(ded, 10);
                                } else if (item.code === '103' && multiObs[k] && multiObs[k].some(o => o.temp)) {
                                    multiObs[k].forEach(obs => {
                                        const t = parseFloat(obs.temp) || 0;
                                        if (t > 0 && t < 120) ded += 5;
                                        else if (t >= 120 && t < 140) ded += 3;
                                    });
                                    if (ded === 0) ded = item.points;
                                    if (autoRepeat) ded += 1;
                                    ded = Math.min(ded, 10);
                                } else {
                                    ded = item.points;
                                    if (autoRepeat) ded += 1;
                                }
                                findings.push({ code: item.code, title: item.title, category: cat.name, risk: item.risk, points: item.points,
                                    deduction: ded, notes: itemNotes[k] || '', isRepeat: autoRepeat,
                                    observations: item.code === '101' ? item101Observations[k] : null });
                            }
                        }
                    });
                });

                const categoryScores = allCategories.map(cat => {
                    const scored = cat.items.filter(i => i.risk !== 'INFO_ONLY' && assessmentScores[`${cat.id}_${i.code}`] !== 'NA');
                    const catFindings = findings.filter(f => f.category === cat.name);
                    const catPoints = scored.reduce((s,i) => s+i.points, 0);
                    const catDed = catFindings.reduce((s,f) => s+f.deduction, 0);
                    const catPct = catPoints > 0 ? ((catPoints - catDed) / catPoints) * 100 : 100;
                    return { name: cat.name, findings: catFindings.length, total: catPoints, percentage: Math.max(0, catPct) };
                });

                return (
                    <div className="min-h-screen p-4 md:p-6 relative" style={{zIndex:1}}>
                        <div className="max-w-3xl mx-auto">
                            {/* Header */}
                            <div className="text-center mb-2 no-print anim-fade"><LogoLockup size="sm" /></div>

                            {/* Score Hero */}
                            <div className="text-center mb-8 anim-fade-slide anim-delay-1">
                                <h2 className="text-lg font-bold text-gray-400 mb-3 heading-spaced" style={{letterSpacing:'0.2em'}}>ASSESSMENT COMPLETE</h2>
                                <div className="inline-block rounded-2xl px-10 py-6 anim-count anim-delay-2" style={{background: getRatingBg(scoringData.percentage, scoringData.criticalFindings), border: `1px solid ${getRatingBg(scoringData.percentage, scoringData.criticalFindings).replace('0.1','0.3')}`}}>
                                    <div className={`text-6xl font-extrabold mb-1 ${getRatingColor(scoringData.percentage, scoringData.criticalFindings)}`} style={{fontFamily:'Outfit'}}>
                                        {Math.round(scoringData.percentage)}<span style={{fontSize:'0.35em',opacity:0.5,fontWeight:500}}> / 100</span>
                                    </div>
                                    <p className={`text-lg font-bold heading-spaced ${getRatingColor(scoringData.percentage, scoringData.criticalFindings)}`}>{getRatingText(scoringData.percentage, scoringData.criticalFindings)}</p>
                                </div>
                                <p className="text-gray-500 text-sm mt-4">{setupData.specialistName} &bull; {storeLabel} &bull; {setupData.assessmentDate}</p>
                            </div>

                            {/* Stat Cards */}
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
                                {[
                                    { label: 'ITEMS SCORED', value: Object.values(categoryProgress).reduce((s,p) => s+p.checked, 0), color: 'text-white' },
                                    { label: 'CRITICAL', value: scoringData.criticalFindings, color: scoringData.criticalFindings > 0 ? 'text-red-400' : 'text-white' },
                                    { label: 'NON-CRITICAL', value: scoringData.nonCriticalFindings, color: scoringData.nonCriticalFindings > 0 ? 'text-red-400' : 'text-white' },
                                    { label: 'COACHED', value: scoringData.coachedCount, color: 'text-white' },
                                    { label: 'REPEATS', value: scoringData.repeatCount, color: scoringData.repeatCount > 0 ? 'text-red-400' : 'text-white' },
                                    ...(scoringData.mmccaTotal > 0 ? [{ label: 'MMCCA FINDINGS', value: scoringData.mmccaFindings, color: scoringData.mmccaFindings > 0 ? 'text-orange-400' : 'text-white' }] : []),
                                ].map((s, i) => (
                                    <div key={s.label} className={`fg-card-stat p-4 anim-fade-slide anim-delay-${i+3}`}>
                                        <p className="text-gray-500 text-xs heading-spaced mb-1">{s.label}</p>
                                        <p className={`text-2xl font-bold ${s.color}`}>{s.value}</p>
                                    </div>
                                ))}
                            </div>

                            {/* Category Breakdown */}
                            <div className="fg-card-flat p-5 mb-6 anim-fade-slide anim-delay-5">
                                <h3 className="text-sm font-bold text-gray-400 mb-4 heading-spaced">CATEGORY BREAKDOWN</h3>
                                <div className="space-y-3">
                                    {categoryScores.filter(c => c.total > 0).map(cat => (
                                        <div key={cat.name} className="flex items-center gap-3">
                                            <span className="text-gray-300 text-xs w-40 truncate">{cat.name}</span>
                                            <div className="flex-1 fg-progress-track"><div className="fg-progress-fill" style={{width:`${cat.percentage}%`}}></div></div>
                                            <span className={`text-xs font-bold w-10 text-right ${getRatingColor(cat.percentage, 0)}`}>{Math.round(cat.percentage)}%</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Findings */}
                            {findings.length > 0 && (
                                <div className="fg-card-flat p-5 mb-6 anim-fade-slide anim-delay-6">
                                    <h3 className="text-sm font-bold text-gray-400 mb-4 heading-spaced">FINDINGS ({findings.length})</h3>
                                    <div className="space-y-2">
                                        {findings.map((f, i) => (
                                            <div key={i} className="p-3 rounded-lg" style={{background:'rgba(255,255,255,0.03)', borderLeft:'3px solid var(--fg-red)'}}>
                                                <div className="flex flex-wrap items-center gap-2 mb-1">
                                                    <span className="fg-badge fg-badge-code">{f.code}</span>

                            {/* Coached Findings */}

                            {/* CROSS-REFERENCE LINKED FINDINGS — show MMCCA→FSA connections at end of audit */}
                            {(() => {
                                const linkedFindings = [];
                                allCategories.forEach(cat => {
                                    cat.items.forEach(item => {

                                        const k = `${cat.id}_${item.code}`;
                                        if (assessmentScores[k] !== 'NOT_COMPLIANT') return;
                                        const refs = CROSS_REF_MAP[item.code];

                                        refs.forEach(ref => {
                                            let fsaItem = null, fsaCatId = null;
                                            ASSESSMENT_DATA.categories.forEach(c => {

                                            });
                                            const fsaKey = fsaCatId ? `${fsaCatId}_${ref.fsa}` : null;
                                            const fsaScore = fsaKey ? assessmentScores[fsaKey] : null;
                                            linkedFindings.push({
                                                mmccaCode: item.code, mmccaTitle: item.title, mmccaCat: cat.name,
                                                fsaCode: ref.fsa, fsaTitle: fsaItem?.title || ref.reason, reason: ref.reason,

                                        });

                                            {linkedFindings.map((lf, i) => (

                                                    </div>
                                                    <span className={`text-xs font-bold px-2 py-0.5 rounded flex-shrink-0 ${

                                                    </span>

                                            ))}

                                    </div>
                                );
                            })()}

                            {/* FEATURE 10: Gamification - Streaks */}
                            {(() => {

                                const perfectCats = [];
                                const priorItems = priorFindings?.items || {};
                                findings.forEach(f => {

                                    }

                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2"><polygon points="12 2 15.09 10.26 24 10.35 17.77 16.01 19.91 24.29 12 18.77 4.09 24.29 6.23 16.01 0 10.35 8.91 10.26 12 2"/></svg>

                                            <p className="text-sm text-green-300 mb-2">

                                            <p className="text-sm text-green-300">

                                        {findings.map((f, i) => {

                                                <div key={i} className="p-4 rounded-lg" style={{background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.06)'}}>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                        <div>
                                                            <div className="flex items-center justify-between mb-1">
                                                                <label className="block text-gray-400 text-xs font-semibold">CORRECTIVE ACTION</label>
                                                                <VoiceNotesButton value={cap.action||''} onChange={v => updateCap('action', v)} />
                                                            </div>
                                                            <textarea value={cap.action} onChange={e => updateCap('action', e.target.value)} placeholder="What corrective action will be taken..." className="fg-input text-sm" rows="2" style={{resize:'none'}} />
                                                        </div>
                                                        <div>
                                                            <label className="block text-gray-400 text-xs font-semibold mb-1">OWNER / RESPONSIBLE PERSON</label>

                                                        <div>
                                                            <label className="block text-gray-400 text-xs font-semibold mb-1">PRIORITY</label>
                                                            <select value={cap.priority} onChange={e => updateCap('priority', e.target.value)} className="fg-input text-sm" style={{cursor:'pointer'}}>
                                                                <option value="Immediate">Immediate</option>
                                                                <option value="Within 24hrs">Within 24hrs</option>
                                                                <option value="Within 7 days">Within 7 days</option>
                                                                <option value="Within 30 days">Within 30 days</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* FEATURE 3: Supabase Save Button */}
                            {findings.length > 0 && (
                                <div className="mb-6">
                                    <button onClick={async () => {
                                        setSavingToCloud(true);
                                        try {
                                            const capDataToSave = {};
                                            findings.forEach(f => {
                                                allCategories.forEach(cat => {
                                                    if (cat.items.find(item => item.code === f.code)) {
                                                        const k = `${cat.id}_${f.code}`;
                                                        capDataToSave[f.code] = capData[k] || {};
                                                    }
                                                });
                                            });
                                            const payload = {
                                                location: setupData.store,
                                                score: scoringData.percentage,
                                                rating: getRatingText(scoringData.percentage, scoringData.criticalFindings),
                                                date_started: setupData.assessmentDate,
                                                specialist_name: setupData.specialistName,
                                                total_findings: findings.length,
                                                critical: scoringData.criticalFindings,
                                                non_critical: scoringData.nonCriticalFindings,
                                                coached: scoringData.coachedCount,
                                                repeats: scoringData.repeatCount,
                                                elapsed_time: startTime ? Math.round((Date.now() - startTime) / 1000) : 0,
                                                cap_data: JSON.stringify(capDataToSave)
                                            };
                                            const res = await supaFetch('completed_assessments', {
                                                method: 'POST',
                                                headers: { 'Content-Type': 'application/json', 'apikey': SUPA_ANON, 'Authorization': `Bearer ${SUPA_ANON}`, 'Prefer': 'return=minimal' },
                                                body: JSON.stringify(payload)
                                            });

                                                setSavedToCloud(true);
                                                setTimeout(() => setSavedToCloud(false), 3000);

                                                console.error('Save failed:', res.status);
                                                alert('Could not save to cloud. Table may not exist yet.');

                                            alert('Save error: ' + e.message);

                                        {savingToCloud ? 'Saving to Cloud...' : savedToCloud ? 'Saved to Cloud!' : 'Save to Cloud'}

                                    </div>

                                        <div className="p-4 rounded-xl mb-4" style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)'}}>
