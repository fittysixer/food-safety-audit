                                                </div>
                                                <div className="flex flex-col items-center">
                                                    {(() => {
                                                        const prev = priorFindings.summary.score || 0;
                                                        const curr = scoringData.percentage;
                                                        const diff = curr - prev;
                                                        const isUp = diff > 0;
                                                        const isFlat = Math.abs(diff) < 0.5;
                                                        return (
                                                            <React.Fragment>
                                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={isFlat ? 'rgba(255,255,255,0.3)' : isUp ? '#22c55e' : '#f87171'} strokeWidth="2.5">
                                                                    {isFlat ? <path d="M5 12h14"/> : isUp ? <React.Fragment><path d="M12 19V5"/><polyline points="5 12 12 5 19 12"/></React.Fragment> : <React.Fragment><path d="M12 5v14"/><polyline points="19 12 12 19 5 12"/></React.Fragment>}
                                                                </svg>
                                                                <span className="text-xs font-bold" style={{color: isFlat ? 'rgba(255,255,255,0.3)' : isUp ? '#22c55e' : '#f87171'}}>{isFlat ? '—' : (isUp?'+':'') + diff.toFixed(1) + '%'}</span>
                                                            </React.Fragment>
                                                        );
                                                    })()}
                                                </div>
                                                <div className="text-center">
                                                    <p className="text-xs text-gray-500 mb-1">Today</p>
                                                    <p className="text-2xl font-bold text-white" style={{fontFamily:'Outfit'}}>{Math.round(scoringData.percentage)}</p>
                                                    <p className="text-xs" style={{color:'white'}}>{getRatingText(scoringData.percentage, scoringData.criticalFindings)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* What improved */}
                                    {(() => {
                                        const priorItems = priorFindings?.items || {};
                                        const improved = [];
                                        const newFindings = [];
                                        const persistedFindings = [];

                                        findings.forEach(f => {
                                            const prior = priorItems[f.code];
                                            if (prior && prior.status === 'Not Compliant') {
                                                persistedFindings.push(f);
                                            } else {
                                                newFindings.push(f);
                                            }
                                        });

                                        Object.entries(priorItems).forEach(([code, info]) => {
                                            if (info.status === 'Not Compliant') {
                                                const stillBad = findings.find(f => f.code === code);
                                                if (!stillBad) {
                                                    let itemData = null;
                                                    allCategories.forEach(cat => {
                                                        const found = cat.items.find(i => i.code === code);
                                                        if (found) itemData = found;
                                                    });
                                                    if (itemData) improved.push(itemData);
                                                }
                                            }
                                        });

                                        return (
                                            <React.Fragment>
                                                {improved.length > 0 && (
                                                    <div className="p-3 rounded-xl mb-3" style={{background:'rgba(34,197,94,0.04)', border:'1px solid rgba(34,197,94,0.15)'}}>
                                                        <p className="text-xs font-bold mb-2" style={{color:'#22c55e'}}>
                                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{display:'inline',verticalAlign:'middle',marginRight:'4px'}}><path d="M20 6L9 17l-5-5"/></svg>
                                                            Improvements ({improved.length})
                                                        </p>
                                                        <p className="text-xs text-gray-400 mb-2">These items were findings last time but are now compliant:</p>
                                                        {improved.map(item => (
                                                            <div key={item.code} className="flex items-center gap-2 mb-1">
                                                                <span className="fg-badge fg-badge-code" style={{fontSize:'10px'}}>{item.code}</span>
                                                                <span className="text-xs text-gray-300">{item.title}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}

                                                {persistedFindings.length > 0 && (
                                                    <div className="p-3 rounded-xl mb-3" style={{background:'rgba(var(--fg-red-rgb),0.04)', border:'1px solid rgba(var(--fg-red-rgb),0.15)'}}>
                                                        <p className="text-xs font-bold mb-2" style={{color:'#f87171'}}>
                                                            Repeat Findings ({persistedFindings.length})
                                                        </p>
                                                        <p className="text-xs text-gray-400 mb-2">Still Not Compliant from last assessment — these need corrective action plans:</p>
                                                        {persistedFindings.map(f => (
                                                            <div key={f.code} className="flex items-center gap-2 mb-1">
                                                                <span className="fg-badge fg-badge-code" style={{fontSize:'10px'}}>{f.code}</span>
                                                                <span className="text-xs text-gray-300">{f.title}</span>
                                                                <span className="text-xs text-red-400 ml-auto">-{f.deduction} pts</span>
                                                            </div>
                                                        ))}
                                                    </div>

                                                            New Findings ({newFindings.length})
                                                        </p>
                                                        <p className="text-xs text-gray-400 mb-2">Not found on the prior audit — these are new issues:</p>
                                                        {newFindings.map(f => (
                                                            <div key={f.code} className="flex items-center gap-2 mb-1">
                                                                <span className="fg-badge fg-badge-code" style={{fontSize:'10px'}}>{f.code}</span>
                                                                <span className="text-xs text-gray-300">{f.title}</span>
                                                                <span className="text-xs text-red-400 ml-auto">-{f.deduction} pts</span>
                                                            </div>
                                                        ))}
                                                    </div>

                                                        <span className="text-xs text-gray-500">Assessment Duration: {(() => { const d = Math.floor((Date.now() - startTime)/1000); const m = Math.floor(d/60); return `${m} minute${m!==1?'s':''}`; })()}</span>
                                                    </div>
                                                )}
                                            </React.Fragment>
                                        );
                                    })()}
                                </div>
                            </div>

                            {/* Go Back & Edit — lets specialist fix any scoring error */}
                            <div className="fg-card-flat p-5 mb-6 no-print anim-fade-slide anim-delay-8">
                                <div className="flex items-center gap-2 mb-3">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--fg-red)" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                    <h3 className="text-sm font-bold text-white" style={{fontFamily:'Outfit'}}>Need to Make a Change?</h3>
                                </div>
                                <p className="text-gray-500 text-xs mb-3">Unlike the old system, you can go back and edit any item at any time — no challenges needed. Tap a category to jump back.</p>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
                                    {allCategories.filter(cat => cat.items.some(i => assessmentScores[`${cat.id}_${i.code}`])).map(cat => {
                                        const catFindings = cat.items.filter(i => assessmentScores[`${cat.id}_${i.code}`] === 'NOT_COMPLIANT' && !coachedNotes[`${cat.id}_${i.code}`]?.coached);
                                        const catCoached = cat.items.filter(i => assessmentScores[`${cat.id}_${i.code}`] === 'NOT_COMPLIANT' && coachedNotes[`${cat.id}_${i.code}`]?.coached);
                                        return (
                                            <button key={cat.id} onClick={() => { setExpandedItem(cat.id); setScreen('category'); }}

                                                style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', cursor:'pointer'}}>
                                                <p className="text-white text-xs font-semibold truncate">{cat.name}</p>
                                                <div className="flex gap-2 mt-1">
                                                    {catFindings.length > 0 && <span className="text-xs" style={{color:'#f87171'}}>{catFindings.length} NC</span>}
                                                    {catCoached.length > 0 && <span className="text-xs" style={{color:'#fb923c'}}>{catCoached.length} coached</span>}
                                                    {catFindings.length === 0 && catCoached.length === 0 && <span className="text-xs text-gray-600">All clear</span>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                                <button onClick={() => setScreen('hub')} className="w-full py-2.5 px-4 rounded-xl text-sm font-semibold transition"
                                    style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.12)', color:'rgba(255,255,255,0.7)', cursor:'pointer'}}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{display:'inline',verticalAlign:'middle',marginRight:'6px'}}><polyline points="15 18 9 12 15 6"/></svg>
                                    Back to All Categories
                                </button>
                            </div>

                            {/* Action Buttons */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 no-print anim-fade anim-delay-8">
                                <button onClick={() => window.print()} className="fg-card-flat p-3 text-center cursor-pointer transition hover:scale-[1.02]">
                                    <p className="text-white font-semibold text-sm">Print Report</p>
                                </button>
                                <button onClick={() => alert('Email feature: would send to restaurant')} className="fg-card-flat p-3 text-center cursor-pointer transition hover:scale-[1.02]">
                                    <p className="text-white font-semibold text-sm">Email Report</p>
                                </button>
                                <button onClick={() => { alert('Report saved (placeholder for Supabase)');
                                    try { localStorage.removeItem('fg_audit_draft'); } catch(e) {}
                                    setScreen('setup');
                                    setSetupData({ specialistName:'Sarah Mitchell', store:'0001', assessmentDate: new Date().toISOString().split('T')[0], assessmentType:'Regular', timeStarted: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), managerOnDuty:'Test Manager', employeesPresent:'5' });
                                    setAssessmentScores({}); setItemNotes({}); setRepeatFindings({}); setCoachedNotes({}); setItem101Observations({}); setNcDetails({}); setMultiObs({}); setShowHowToCheck({}); setPhotos({}); setStartTime(null); setPriorFindings(null);
                                }} className="fg-card-flat p-3 text-center cursor-pointer transition hover:scale-[1.02]">
                                    <p className="text-white font-semibold text-sm">Save & Close</p>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<FoodSafetyAuditForm />);
    </script>

    <!-- FEATURE 12: Offline Mode Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker registered successfully');
                }).catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
