            '226': { title: 'Ventilation & Air Quality', video_url: '', overview: 'Verify ventilation is adequate throughout the facility. Hood systems, ceiling vents, and fan guards are the primary assessment targets. 192+ findings system-wide.', procedure: ['Check exhaust hoods above fryers and grill — filters must be clean and hoods functioning.','Inspect ceiling vents above prep areas and the cook line for grease and dust.','Check fan guards in walk-in coolers and freezers.','Verify exhaust vents are pulling air properly — no grease condensation on nearby surfaces.'], scoring: '1 point — Non-Critical.', areas: [{ name: 'Hood Filters & Systems', pct: '40%', products: 'Exhaust hood filters above fryers and grill', cause: 'Heavy grease buildup from infrequent filter cleaning — needs weekly attention' },{ name: 'Ceiling Vents', pct: '30%', products: 'Supply and return vents above prep and cook line', cause: 'Dust and grease film accumulation — add to weekly deep clean checklist' },{ name: 'Cooler Fan Guards', pct: '20%', products: 'Fan guards and evaporator covers in walk-in', cause: 'Dust and debris blocking airflow — affects cooling performance' },{ name: 'Exhaust Vents', pct: '10%', products: 'Restroom and general exhaust vents', cause: 'Dust accumulation reducing air quality — quarterly cleaning minimum' }], tips: ['Inadequate ventilation leads to condensation, grease buildup, and poor air quality.','Also score appropriate MMCCA items for vents, ductwork, and hood filters.'] },
            '236': { title: 'Structure Condition', video_url: '', overview: 'Floors, walls, and ceilings must be smooth, easily cleanable, and in good repair. This is the #2 most common non-critical finding system-wide (1,072+ findings). Mop sink areas and coving are the biggest offenders.', procedure: ['Check all floor tiles for cracks, chips, or missing grout.','Inspect walls for damaged drywall, peeling paint, or holes.','Check ceilings for damaged tiles, water stains, or peeling paint.','Verify all coving (floor/wall junction pieces) is intact and sealed.','Look for holes or gaps that could harbor pests.','Verify exposed concrete is sealed and smooth.'], scoring: '1 point — Non-Critical.', areas: [{ name: 'Mop Sink Area', pct: '25%', products: 'Floor tiles, wall surfaces, baseboards near mop sink', cause: 'Constant water exposure deteriorates surfaces — needs waterproof materials' },{ name: 'Coving / Floor-Wall Junctions', pct: '25%', products: 'Cove base molding throughout kitchen', cause: 'Coving separating from wall or cracked — creates pest harborage' },{ name: 'Kitchen Ceiling', pct: '20%', products: 'Ceiling tiles above cook line and prep area', cause: 'Steam and grease damage to ceiling tiles — replace stained/warped tiles' },{ name: 'Restrooms', pct: '15%', products: 'Floor tiles, wall surfaces, ceiling', cause: 'Water damage and general wear from high-moisture environment' },{ name: 'Back Room / Storage', pct: '15%', products: 'Floor drains, wall panels, storage room surfaces', cause: 'Age-related wear — schedule preventive maintenance during slow periods' }], tips: ['Most items scored here must also be scored on the MMCCA.','For cleanliness issues (dirt, standing water), score 225 instead — this item is about physical condition.','Structural damage creates harborage for pests and makes surfaces impossible to clean properly.'] },
            '237': { title: 'Interior Garbage Containers', video_url: '', overview: 'All interior garbage containers must be clean, emptied as needed, and in good condition — leak-proof, rodent-proof, with proper lids.', procedure: ['Check garbage containers in kitchen for cleanliness', 'Inspect containers in prep area for cleanliness and condition', 'Check containers in restrooms for cleanliness', 'Verify containers are leak-proof and do not spill contents', 'Check containers are rodent-proof with functioning lids', 'Ensure containers are emptied before overflowing', 'Verify containers are in good condition without damage or rust'], scoring: '1 point — Non-Critical.', tips: ['Overflowing trash is an attractant for pests and contamination risk.', 'Check containers in kitchen, prep area, and restrooms.', 'Containers must have tight-fitting lids that prevent pest entry.'] },
            '238': { title: 'Lighting Adequacy & Shields', video_url: '', overview: 'Lighting must be adequate for cleaning and food handling in every area. Light fixtures above exposed food must have shields to prevent glass contamination.', procedure: ['Check lighting adequacy in all work areas', 'Verify adequate light for identifying soil and contamination', 'Check all fixtures above exposed food have shielded coverings', 'Verify tube shields have end caps in place', 'Ensure lighting is sufficient for food handlers to work safely', 'Check for burned out bulbs and replace as needed', 'Inspect all fixtures for proper installation and functionality'], scoring: '1 point — Non-Critical.', tips: ['Score if tube shields are missing end caps.', 'Adequate lighting means you can see well enough to identify soil and contamination.', 'Broken light bulbs create glass contamination risk in food areas.', 'Lighting must meet regulatory standards for food handling areas.'] },
            '239': { title: 'Pest Entry Points & Mop Storage', video_url: '', overview: 'All exterior doors must have gaps no larger than 1/4 inch at the bottom to prevent pest entry. Mop heads must be hung to dry between uses.', procedure: ['Check all exterior doors for gaps larger than 1/4 inch at bottom', 'Walk perimeter for cracks, holes, or openings for pest entry', 'Verify mop heads are hung to dry between uses', 'Check mops are not stored on floor', 'Verify wet mops are properly dried', 'Look for any openings larger than 1/4 inch that pests could squeeze through', 'Check door seals and weather stripping condition'], scoring: '1 point — Non-Critical.', tips: ['Pests can squeeze through incredibly small openings.', 'Score dirty mop heads not hung to dry after use.', 'Wet mops stored on floor create moisture and odors that attract pests.', 'Regular inspection of perimeter prevents pest entry.'] },
            '240': { title: 'Pest Control Devices', video_url: '', overview: 'All pest control devices must be working properly. Insect light traps must be plugged in and operational. Air curtains above exterior doors must be functioning.', procedure: ['Check all insect light traps are plugged in and powered on', 'Verify traps are operational and glue boards have insects', 'Check air curtains above exterior doors are functioning', 'Ensure devices are emptied and maintained regularly', 'Verify traps are positioned to catch insects effectively', 'Check for any non-functioning devices', 'Review maintenance logs for pest control device servicing'], scoring: '1 point — Non-Critical.', tips: ['If bug lights are present, they must be operational.', 'A full trap can become an attractant rather than a control device.', 'Check glue boards in insect light traps regularly.', 'Replace glue boards when they become full of insects.'] },
            '242': { title: 'Exterior Garbage & Dumpster', video_url: '', overview: 'Exterior garbage containers must have lids that are closed between uses. The area around the dumpster must be clean and free of debris, grease, and standing water.', procedure: ['Check exterior garbage container lids are present and functional', 'Verify lids are closed between trash fill-ups and pickups', 'Check dumpster doors are closed between uses', 'Inspect area around dumpster for cleanliness', 'Look for debris and grease accumulation', 'Check for standing water or spills near dumpster', 'Verify dumpster area is properly maintained'], scoring: '1 point — Non-Critical.', tips: ['If the dumpster area is shared with other tenants or not under Five Guys control, do not score.', 'Closed lids prevent pest attraction and odor issues.', 'Dumpster area maintenance prevents pest infestations.'] },
            '243': { title: 'Restroom Condition & Supplies', video_url: '', overview: 'Restrooms must be clean and fully stocked with soap, paper towels, and hot water above 84°F. Women\'s restroom must have a covered trash receptacle.', procedure: ['Check restroom cleanliness and general condition', 'Verify soap is available in dispensers', 'Check paper towels or hand dryers are available and functioning', 'Test hot water temperature (must be above 84°F)', 'Verify handwashing signage is posted', 'Check women\'s restroom has covered trash receptacle', 'Look for cleanliness of fixtures and surfaces'], scoring: '1 point — Non-Critical.', tips: ['Do not score if metered faucets do not flow for 15 seconds — that is a faucet design issue.', 'Hot water is only scored if below 84°F.', 'Covered trash receptacle required only in women\'s restroom.', 'Clean restrooms indicate overall facility maintenance standards.'] },
            '250': { title: 'Big 6 Pathogen Knowledge', video_url: '', overview: 'Manager on duty must know the Big 6 pathogens requiring employee exclusion: Shiga toxin-producing E. coli, Shigella, Salmonella Typhi, Norovirus, Hepatitis A, and Nontyphoidal Salmonella.', procedure: ['Ask manager on duty: "What are the 6 illnesses that require employee exclusion?"', 'Verify knowledge of all Big 6 pathogens', 'Confirm understanding of exclusion requirements', 'Check reference materials if provided', 'Assess manager knowledge of pathogen transmission', 'Verify proper procedures are in place for employee illness reporting'], scoring: '1 point — Non-Critical.', tips: ['The Big 6 are pathogens that spread through food handling.', 'These cause serious illness outbreaks.', 'Do not score if employee uses a cheat sheet correctly.', 'Managers must understand exclusion rules to prevent outbreaks.'] },
            '251': { title: 'Food Safety Certificates', video_url: '', overview: 'Current ServSafe or Food Protection Manager certificates must be posted and valid. Location needs 3 QC certificates, or 2 QC + 1 GM certificate.', procedure: ['Locate all food safety certificates posted at location', 'Verify ServSafe or Food Protection Manager certificates', 'Check certificate expiration dates are current', 'Confirm 3 QC certificates, or 2 QC + 1 GM certificate are present', 'Check which certified managers are currently working', 'Take photo showing all certificates including any expired or missing ones', 'Document any missing or expired certificates'], scoring: '1 point — Non-Critical.', tips: ['Certificates expire — check dates carefully.', 'Expired certificates do not satisfy the requirement.', 'Three QC certificates preferred, or minimum 2 QC + 1 GM.', 'Managers on duty must have current certification.'] },
            '252': { title: 'Operations Safety Binder', video_url: '', overview: 'The Ops Safety Binder must be present and maintained with current health department inspection reports and monthly pest control reports.', procedure: ['Locate the Ops Safety Binder at the location', 'Verify most recent health department inspection report is included', 'Check pest control monthly reports are current and filed', 'Ensure binder is organized and accessible', 'Review dates of documents to ensure they are current', 'Verify binder is maintained in good condition'], scoring: '1 point — Non-Critical.', tips: ['This binder is the restaurant\'s compliance record.', 'Health inspectors and auditors will ask for it.', 'Newly opened stores without health inspection reports should not be scored if none available.'] },
            '253': { title: 'Time/Temperature Log Completion', video_url: '', overview: 'Time/Temp logs must be filled out completely and accurately. Use the ComplianceMate Auditor Report to assess. This is the #4 most common non-critical finding (538+ findings). Missing time blocks and connectivity issues are the main causes.', procedure: ['Pull up the ComplianceMate Auditor Report for the previous day.','Verify that ALL required time blocks were completed with actual readings.','Look for gaps — missing time blocks are the #1 issue.','Check for copied numbers — identical readings across all periods indicate fabrication.','Cross-reference a few entries against what the equipment is actually reading right now.'], scoring: '2 points — Non-Critical.', areas: [{ name: 'Missing Time Blocks', pct: '50%', products: 'Gaps in the daily temp log', cause: 'Team got busy during service and skipped a time block — build into shift routine' },{ name: 'Connectivity Issues', pct: '25%', products: 'Internet outages preventing digital entry', cause: 'No backup process for manual logging when ComplianceMate goes offline' },{ name: 'Fabricated Entries', pct: '15%', products: 'Identical readings across all periods', cause: 'Crew copying numbers instead of taking actual temps — training issue' },{ name: 'Incomplete Entries', pct: '10%', products: 'Partial data — some sensors logged, others skipped', cause: 'Not all required areas checked during the temp round' }], tips: ['Do NOT score sensor NAs (offline sensors) under this item — those belong under 253a.','This item is about manual log entries and their completeness.','Time/temperature logs are legal compliance documents — treat them with that level of importance.'] },
            '253a': { title: 'ComplianceMate Sensor Status', video_url: '', overview: 'Verify ComplianceMate sensor status for Walk-in Cooler, Dressing Station, Chef Base, Milkshake Machine, and Milkshake Make Station. Sensors should report and be in normal range.', procedure: ['Pull up ComplianceMate Auditor Report', 'Check Walk-in Cooler sensor status', 'Verify Dressing Station (Salad) sensor status', 'Check Chef Base (Meat Drawer) sensor status', 'Verify Milkshake Machine sensor status', 'Check Milkshake Make Station sensor status', 'Score any sensors that are NA (offline) or out of range'], scoring: '1 point — Non-Critical.', tips: ['Do NOT score Prep Room sensors.', 'Only score the five listed sensors.', 'Offline sensors should be reported for maintenance.', 'Out of range readings indicate equipment or sensor problems.'] },
            '253d': { title: 'Milkshake Pump Cleaning Verification', video_url: '', overview: 'Milkshake pump cleaning checklist must be completed for previous Tuesday and Friday sessions. Photo documentation must show pumps fully disassembled. Bus tub must be clean with required tools.', procedure: ['Pull up milkshake pump cleaning checklist', 'Verify previous Tuesday cleaning session is completed', 'Verify previous Friday cleaning session is completed', 'Review photo documentation showing pumps fully disassembled', 'Check bus tub is clean and available', 'Verify cleaning brushes are present in bus tub', 'Verify food-grade lube is available in bus tub'], scoring: '1 point — Non-Critical.', tips: ['As of Q1 2026, Wednesday Milkshake Pump Cleaning will also be added to Auditor Report.', 'Photos must clearly show full disassembly.', 'Proper pump maintenance prevents cross contamination in milkshake products.'] },
            '255': { title: 'Sanitizer Knowledge Assessment', video_url: '', overview: 'Crew members must answer three sanitizer knowledge questions correctly: acceptable PPM range (150-400), change frequency (every 2 hours), and temperature range (75°F or below).', procedure: ['Ask crew member: "What is the acceptable PPM range for Ecolab quat sanitizer?"', 'Verify answer is 150-400 PPM', 'Ask: "How often should sanitizer be changed?"', 'Verify answer is every 2 hours', 'Ask: "What is the acceptable temperature range for sanitizer solution?"', 'Verify answer is 75°F or below', 'Do not score if they use a reference card but know the information'], tips: ['Crew members should be able to answer from knowledge.', 'Do not score if using a reference card.', 'Coach toward independent knowledge of sanitizer standards.', 'Proper sanitizer knowledge prevents contamination.'] },
            '255a': { title: 'Kay 5 Chlorine Knowledge', video_url: '', overview: 'For locations using Kay 5 chlorine, crew members must know the acceptable PPM range (50-100) and change frequency (every 2 hours).', procedure: ['Ask: "What is the acceptable PPM range for Kay 5 chlorine sanitizer?"', 'Verify answer is 50-100 PPM', 'Ask: "How often is it changed?"', 'Verify answer is every 2 hours', 'Assess crew member knowledge', 'Only applies to locations using Kay 5 chlorine'], scoring: '1 point — Non-Critical.', tips: ['Do not score if a cheat sheet is used.', 'Coach toward independent knowledge.', 'Kay 5 is typically used for milkshake machine sanitizing.', 'Proper concentration and change frequency prevent contamination.'] },
            '256': { title: 'Beef Delivery Temp Knowledge', video_url: '', overview: 'Crew members must know the acceptable ground beef delivery temperature range: US 28°F to 41°F, Canada -2°C to 5°C.', procedure: ['Ask: "What is the acceptable temperature range for ground beef delivery?"', 'Verify answer for US locations: 28°F to 41°F', 'Verify answer for Canadian locations: -2°C to 5°C', 'If beef arrives outside range, must be rejected or reported through FoodLogiq', 'Assess crew member knowledge of receiving standards'], scoring: '1 point — Non-Critical.', tips: ['This is critical receiving knowledge.', 'Do not score if a cheat sheet is used.', 'Coach toward independent knowledge of receiving standards.', 'Out of range beef must be rejected immediately.'] },
            '260': { title: 'Bread Product Verification', video_url: '', overview: 'All bread must be an approved Five Guys product with valid use-by date. Check date codes on all bread bags — no bread past use-by date.', procedure: ['Check all bread products are approved Five Guys products', 'Inspect date code identifiers on bread bags', 'Verify no bread is past use-by date', 'Check sealed bags in storage for expiration dates', 'Do not score undated bread if bag is currently open on small bread table during service', 'Verify proper product rotation'], scoring: '1 point — Non-Critical.', tips: ['Bread is delivered by vendor with manufacturer date codes.', 'Check sealed bags in storage for expiration.', 'Use-by dates must be followed strictly.', 'Proper bread storage maintains product quality and safety.'] },
            '261': { title: 'Cheese Storage Practices', video_url: '', overview: 'Cheese must be properly stored with date labels. If held in ice bath at grill, must be in lexan container with date and product label. Temperature is critical — melted ice bath is major deduction.', procedure: ['Check cheese storage location and condition', 'Verify date labels are present on cheese containers', 'If ice bath is used at grill, check cheese is in lexan container', 'Verify lexan container has date and product label', 'Monitor ice bath temperature maintenance', 'Check cheese temperature separately under item 101', 'Ensure proper rotation of cheese products'], scoring: '1 point — Non-Critical.', tips: ['Cheese in melted ice bath is 25% of all item 101 deductions.', 'If cheese is out of temp, score under item 101 instead.', 'Never prep cheese directly into the serving container.', 'Proper ice bath maintenance is critical for cheese holding.'] },
            '262': { title: 'Ground Beef Processing', video_url: '', overview: 'Ground beef must be processed per Five Guys procedures: hand-prepared from vacuum-packed beef daily, raw patties in chilled storage, cooked to order with specific HACCP procedures.', procedure: ['Verify beef is vacuum-packed and processed on-site daily', 'Check raw patties are stored in chilled containers', 'Verify proper grill section usage: Section 1 for raw patties, Section 2 for pressing, Section 3 for finishing', 'Confirm disposable gloves used for raw patties on section 1', 'Verify red-handled spatula used for pressing on section 2', 'Check final cooking on section 3', 'Verify all beef is cooked to proper temperature'], tips: ['HACCP procedures are critical for ground beef safety.', 'Raw patties must be handled separately from cooked product.', 'Temperature verification is essential at final cooking stage.', 'Proper grill section organization prevents cross-contamination.'] },
            '265': { title: 'SDS/MSDS Binder', video_url: '', overview: 'Safety Data Sheets must be available for every chemical in the facility. The SDS binder may be stored in the Ops binder if a separate MSDS binder is not maintained. Must be readily accessible to all employees.', procedure: ['Locate SDS binder or verify SDS in Ops binder', 'Check all chemicals in use have current SDS sheets', 'Verify SDS documents are readable and legible', 'Confirm SDS location is readily accessible to employees', 'Check that SDS sheets match chemicals actually in use', 'If products switched, verify old SDS is replaced', 'Ensure SDS are maintained and organized properly'], scoring: '1 point — Non-Critical.', tips: ['SDS sheets must match chemicals actually in facility.', 'If restaurant switched products, old SDS should be replaced.', 'SDS must be readily accessible to ALL employees at all times.', 'Proper chemical documentation ensures safety compliance.'] },
            '275': { title: 'Knife Storage Safety', video_url: '', overview: 'Culinary knives must be stored in racks that fully enclose the blades when not in use. When in use at a station, place at back of counter with blade facing away from work area.', procedure: ['Check all knives are stored in fully enclosed racks when not in use', 'Verify blade enclosure is complete and safe', 'When knives are in use, confirm they are at back of counter', 'Check blade faces away from work area when in use', 'Verify safe handling practices during food prep', 'Check for any exposed blades not in enclosed storage'], scoring: '1 point — Non-Critical.', tips: ['This is both a crew safety and food safety issue.', 'Exposed blades create serious injury risk during prep.', 'Fully enclosed racks prevent accidental contact.', 'Proper storage during service maintains safe work environment.'] },
            '270': { title: 'Slip-Resistant Shoes', video_url: '', overview: 'Every employee on shift must wear slip-resistant shoes. Kitchen floors get slippery from grease, water, and food debris throughout the day.', procedure: ['Check all team members on shift are wearing slip-resistant shoes', 'Check employees arriving for shift have proper footwear', 'Check employees leaving shift were compliant', 'Look for worn-out shoes that have lost slip resistance', 'Verify slip-resistant soles are present on all shoes', 'Note any employees with non-compliant footwear'], scoring: '1 point — Non-Critical.', tips: ['This is a safety requirement for crew safety.', 'Kitchen floors get very slippery during service.', 'New employees should be informed of shoe policy before first shift.', 'Worn-out shoes lose their slip resistance — coach for replacement.'] },
            '206': { title: 'Serving Practices', video_url: '', overview: 'Service staff must not touch food-contact or lip-contact surfaces of tableware. Only handles may be touched.', procedure: ['Observe service staff handling cups and utensils', 'Watch for touching food-contact surfaces of dishes', 'Watch for touching lip-contact areas of cups', 'Ensure staff only handle cups by the base or lower portion', 'Verify staff only touch utensil handles, not bowl/spoon surfaces', 'Monitor staff throughout service periods'], scoring: '2 points — Non-Critical.', tips: ['Five Guys notes this as N/A for most locations.', 'Only applicable if tableware is touched during service.'] },
            '213': { title: 'Consumer Advisory', video_url: '', overview: 'A Consumer Advisory must be posted if raw or undercooked animal products are offered as ready-to-eat.', procedure: ['Check menu for any raw or undercooked animal products served as ready-to-eat', 'Verify appropriate signage is posted if applicable', 'Five Guys serves all burgers well done, so this is typically N/A'], scoring: '1 point — Non-Critical.', tips: ['Five Guys notes this as N/A for standard locations.', 'Only applies to locations with atypical menu items offering raw or undercooked products.'] },
            // ===== MMCCA — FACILITY CONDITION GUIDANCE =====
            // Dining Room (500-series)
            '500': { title: 'Lighting', check: 'Evaluate all lighting in the dining room: pendant lights, bulbs, emergency lights. Check for dead bugs, grease/dust build-up, debris, cracked/broken shields or pendants, water marks, burnt-out bulbs, and lights not working. Note different color warmth bulbs and non-functional emergency lights.', tips: 'Ask Manager to test emergency lights. Food court items = mark NA.' },
            '501': { title: 'Ceiling Tiles', check: 'Check all ceiling tiles for water staining, missing tiles, broken or damaged tiles, mismatched tiles, and improper fitting (popped up). Assess dusty/greasy vents/tiles/ductwork, debris/food splatter, chipped paint on vents, and rust on vents.', tips: 'None.' },
            '502': { title: 'Windows/Window Sills', check: 'Check cleanliness: dead bugs (score even 1), dust/grease build-up, food debris, trash, and fingerprints. Assess condition: cracked or damaged window or sill.', tips: 'Food court = NA.' },
            '503': { title: 'Floors', check: 'Check for greasy, sticky, debris, excessive standing water. Assess broken/damaged tiles, missing/damaged grout.', tips: 'Score floor under soda station under item 510. Food court = NA.' },
            '504': { title: 'Comment Card Board', check: 'Check cleanliness: dust/grease build-up. Assess condition: damaged board. Check for inappropriate social comments. Verify cards set up randomly (not neat rows). Ensure minimum 10 comment cards and 5 crayons properly stocked.', tips: 'None.' },
            '504a': { title: 'Comment Board Availability', check: 'Confirm how many comment boards are available at the location.', tips: 'None.' },
            '505': { title: 'Fire Extinguishers', check: 'Check for dust/grease build-up, debris, and extinguisher sitting on floor (not hung correctly).', tips: 'None.' },
            '506': { title: 'Signage', check: 'Check cleanliness: dust/grease build-up, debris, stains. Assess condition: laminate peeling, not secured to wall properly/loose, rusted staples, water damage.', tips: 'None.' },
            '507': { title: 'Walls', check: 'Check cleanliness: dust/grease build-up, debris. Assess condition: broken/damaged wall, wall tiles, wall junction/coving, scuff marks.', tips: 'None.' },
            '508': { title: 'Chairs and High Chairs', check: 'Highchairs: check all for damage (broken buckle) and debris. Chairs: assess randomly (only 4). Score for build-up (greasy, food debris, dust, sticky residue). Black scuff marks 2+ inches: ask manager when last cleaned, only score if not cleaned in last 24 hours. Metal chairs: cleanliness issues, wobbly from missing rubber foot pads, chipped paint or damage including rust. Wooden chairs: excessive wear (splinters, gouges).', tips: 'Do not score wobbly chairs if all rubber foot pads are present. Food court = NA.' },
            '509': { title: 'Tables', check: 'Assess randomly (only 4 tables). Score if wobbly by 1/2" or more. Do not assess high top tables (known design flaw). Score for build-up including gum. Score chipped table laminate if larger than 1/2". Score rusty, chipped table base.', tips: 'Food court = NA.' },
            '510': { title: 'Soda Station', check: 'Assess sides, top, drains, floor underneath, storage cabinets. Check floor sink/drain not clean (moldy, food debris, trash). Check cabinet exterior/interior with grease/dust/sticky residue/debris. Score damaged cabinets (chipped laminate, rust) and doors not closing properly (not flush).', tips: 'Do NOT open soda machine interior.' },
            '511': { title: 'Doors', check: 'Check cleanliness: fingerprints, debris, sticky handles. Assess condition: damaged door sweep, rust, damaged/broken, chipped paint.', tips: 'Scraping on door handle due to customer rings is acceptable. Food court = NA.' },
            '512': { title: 'Trash Cans (Dining)', check: 'Check cleanliness: debris (inside, outside, handles), odor. Assess condition: broken/hanging door on cabinet, chipped laminate greater than 1/2" on cabinet, damaged can. Score if trash full (cannot put anything else in can).', tips: 'None.' },
            '513': { title: 'Dunnage Racks', check: 'Boxes of peanuts/bulk oil/bags of potatoes must be marked with receive date. Bags of potatoes on rack not floor. Max stack: potato bags 5 high against wall, 4 high freestanding. Peanut boxes 3 high (includes open box). Oil max 2 high. Score if any section less than 2 potato bags or 1 box bulk oil. Check cleanliness: dust/grease, debris, sticky. Assess condition: damaged/broken, rust.', tips: 'Food court = NA.' },
            '520': { title: 'Fixtures', check: 'Assess all fixtures in both men\'s and women\'s restrooms. Score for: fixtures broken/damaged, sink not clean on all surfaces/caulking (no discoloration, mold, mildew), toilet seat loose (moves more than 1/2"), baby changing station not clean/buckle broken/poor condition, graffiti, plunger in bathroom or anywhere other than mop sink/chemical closet (must be stored covered in bag/caddy/container), cleaning tools or chemicals observed.', tips: 'Do NOT assess restrooms at mall/airport locations.' },
            '521': { title: 'Mirror', check: 'Check cleanliness: dust build-up, debris. Assess condition: broken, oxidation, damaged. Score for graffiti.', tips: 'None.' },
            '522': { title: 'Walls', check: 'Check cleanliness: dust/grease build-up, debris. Assess condition: broken/damaged wall, wall tiles, wall junction/coving. Score for graffiti.', tips: 'None.' },
            '523': { title: 'Floors and Drains', check: 'Check cleanliness: greasy, sticky, food debris, moldy, excessive standing water. Assess condition: broken/damaged tiles, missing/damaged grout, broken/damaged drain cover.', tips: 'None.' },
            '524': { title: 'Abnormal Odor', check: 'Assess both restrooms. Score for lingering odor associated with drain or poor cleanliness.', tips: 'Standard comment provided.' },
            '525': { title: 'Ceiling Tiles (Restroom)', check: 'Check for water stained, missing, broken, damaged, mismatched, not properly fitted tiles. Check dusty/greasy vents/tiles, debris/food splatter, chipped paint on vents, rust on vents.', tips: 'None.' },
            '526': { title: 'Dispensers', check: 'Assess in both restrooms. Score if not clean (dust, debris), poor condition (broken, damaged, rusted, not attached to wall), present but not stocked (do NOT score baby changing station dispenser empty). If seat cover dispenser present it must be maintained. Score for graffiti.', tips: 'None.' },
            '527': { title: 'Trash Cans (Restroom)', check: 'Check cleanliness: debris (inside, outside, handles), odor. Assess condition: damaged can. Score if trash full. Women\'s trash can must have a covered lid.', tips: 'Cross-reference: also score FSA item 243 for no covered trash can in women\'s restroom.' },
            '528': { title: 'Signage (Restroom)', check: 'Check cleanliness: dust/grease, debris, stains. Assess condition: laminate peeling, not secured to wall/loose, rusted staples, water damage.', tips: 'Cross-reference: score FSA item 229 if restroom missing "Employee must wash hands" sign.' },
            '529': { title: 'Lighting (Restroom)', check: 'Check cleanliness: dead bugs, grease/dust, debris. Assess condition: cracked/broken shield/pendant, water marks, burnt out bulb, not working. Check for different color warmth and non-functional emergency lights.', tips: 'Ask Manager to test emergency lights. For mall/airport, mark NA.' },
            '530': { title: 'Doors (Restroom)', check: 'Check cleanliness: dust/grease, debris, sticky handles. Assess condition: rust, damaged/broken, chipped paint. Score for graffiti.', tips: 'None.' },
            '540': { title: 'Desk Area', check: 'Score for desk not clean, disorganized, wiring not contained, food on desk.', tips: 'Beverages are allowed on desk.' },
            '541': { title: 'Personal Items Storage', check: 'Assess lockers/cubbies. Score if not clean and organized, food/drinks in lockers, damage to lockers/cubbies.', tips: 'None.' },
            '545': { title: 'Lighting (Kitchen)', check: 'Evaluate all kitchen lighting. Check cleanliness: dead bugs, grease/dust, debris. Assess condition: cracked/broken shield, water marks, burnt out bulb, not working. Check for different color warmth bulbs.', tips: 'None.' },
            '546': { title: 'Ceiling Tiles (Kitchen)', check: 'Check for water stained, missing, broken, damaged, mismatched, not properly fitted tiles. Check dusty/greasy vents/tiles, debris, chipped paint on vents, rust on vents.', tips: 'None.' },
            '547': { title: 'Sides and Back of Equipment', check: 'Assess meat grill, bread grill, fryers, fry dump station. Look between equipment with flashlight. Score for: grease build-up, debris.', tips: 'Do NOT MOVE HOT EQUIPMENT. Only assess behind if accessible (moving non-electrical equipment on castor wheels).' },
            '548': { title: 'Fryer Details', check: 'Open front panel, assess inside door and bottom of fryer. Score for: grease build-up, debris, poor condition (door broken, doesn\'t close properly, damaged).', tips: 'None.' },
            '549': { title: 'Electrical and Gas Lines', check: 'Assess behind equipment under the hood using flashlight. Score for: frayed/worn wires, damaged gas line, grease build-up, debris.', tips: 'Do NOT MOVE HOT EQUIPMENT. Fry draining cart can typically be moved to see behind grills.' },
            '550': { title: 'Trash Cans (Kitchen)', check: 'Check cleanliness: debris (inside, outside, handles), odor. Assess condition: damaged can. Score if trash full.', tips: 'Cross-reference: also score FSA item 237.' },
            '551': { title: 'Hot Holding Unit', check: 'Assess the steam well. Check cleanliness: debris. Assess condition: not working at all, frayed electrical wires, damaged.', tips: 'Cross-reference: score FSA item 103 if unit not holding proper temperature. Do NOT score here for improper temperature.' },
            '552': { title: 'Shake Machine/Fountainette', check: 'If store has no shake machine, mark NA. Check cleanliness: dust/grease, debris. Assess condition: damaged, not working, frayed electrical wire.', tips: 'None.' },
            '553': { title: 'Dressing Station', check: 'Check cleanliness: food splatter, debris, mold on gaskets, cutting board not clean. Assess condition: damaged gaskets/lid/door, units not working, cutting board with deep gouges.', tips: 'Cross-references: damaged gaskets also score FSA 222, gaskets not clean also score FSA 219, damaged cutting board also score FSA 119, cutting board not clean also score FSA 118. Do NOT score here if not holding temperature.' },
            '554': { title: 'Shelves Below Kitchen Counter', check: 'Assess all shelving (under the red counters). Check for dust/grease, debris, sticky, damaged/broken shelves.', tips: 'None.' },
            '555': { title: 'Sneeze Guards', check: 'Check for grease build-up, debris, fingerprints, broken/cracked panel, missing panel.', tips: 'None.' },
            '556': { title: 'Line Printer and Number Dots', check: 'Assess the line printer, day dots and shelving. Check for dust/grease, white powder, debris, broken printer, damaged number dot holder (do not score for missing dots), rust.', tips: 'None.' },
            '557': { title: 'Bread Bags on Dressing Table', check: 'Assess bread bags. Score for grease build-up on bags.', tips: 'None.' },
            '558': { title: 'Walls (Kitchen)', check: 'Check cleanliness: dust/grease, debris. Assess condition: broken/damaged wall, wall tiles, FRP, stainless steel, wall junction/coving.', tips: 'None.' },
            '559': { title: 'Grill Details', check: 'Assess grill top, corners, chute and trap. Check for grease build-up, debris, damage.', tips: 'None.' },
            '560': { title: 'Drains (Kitchen)', check: 'Check floor drains (NOT assessing floors). Check for damaged/missing drain cover, debris, grease/mold build-up, worn grout around drain, odor.', tips: 'None.' },
            '561': { title: 'Hood Vents', check: 'Assess the hood. Check for excessive grease/dust build-up, debris, cap blown off, missing hood panel, damaged hood panel, full drip pan.', tips: 'None.' },
            '562': { title: 'Equipment Knobs/Handles', check: 'Assess all knobs/handles on all kitchen equipment. Check for missing knob, damaged knob/handle, debris.', tips: 'None.' },
            '563': { title: 'Doors (Kitchen)', check: 'Check cleanliness: fingerprints, debris, sticky. Assess condition: rust, damaged/broken, chipped paint.', tips: 'None.' },
            '564': { title: 'Caster Wheels (Kitchen)', check: 'Assess on all equipment. Check for grease/dust on wheels, missing wheels, damaged wheels, rusted wheels.', tips: 'None.' },
            '565': { title: 'Table Legs (Kitchen)', check: 'Assess for all kitchen equipment. Check for grease/dust, debris, damaged legs, rusted legs.', tips: 'None.' },
            '566': { title: 'Chef Base', check: 'Check cleanliness: food splatter, debris, mold on gaskets. Assess condition: damaged gaskets, units not working.', tips: 'Cross-references: damaged gaskets also score FSA 222, gaskets not clean also score FSA 219. Do NOT score here if not holding temperature.' },
            '570': { title: 'Red Counter', check: 'Assess POS/counter area. Check for grease/dust, debris, sticky, damaged counter (chip larger than 1/2", scratch longer than 1"), discolored counter.', tips: 'None.' },
            '571': { title: 'POS/Credit Card Terminal', check: 'Assess front, back, sides. Check for grease/dust, white powder, debris, damaged machine.', tips: 'None.' },
            '572': { title: 'Stacks of Cups and Cup Holders', check: 'Assess stacks of cups. Check for empty cup holder, damaged cup holder, grease/dust on cup holder, debris on cup holder.', tips: 'None.' },
            '575': { title: 'Fry Station and Bagging Area', check: 'Standard facility check for cleanliness and condition issues in fry station and bagging area.', tips: 'None.' },
            '576': { title: 'Napkins', check: 'Check napkin stack at least 6" high, napkin holder not clean (if holder available). Score if no napkins available.', tips: 'Do NOT SCORE if napkins are not in a holder — a holder is not required.' },
            '577': { title: 'Menuboard', check: 'Check for grease/dust, peeling lettering/numbers, damage.', tips: 'None.' },
            '580': { title: 'Lighting (BOH)', check: 'Evaluate all prep area/BOH lighting. Check cleanliness: dead bugs, grease/dust, debris. Assess condition: cracked/broken shield, water marks, burnt out bulb, not working. Check for different color warmth and non-functional emergency lights.', tips: 'Ask Manager to test emergency lights.' },
            '581': { title: 'Ceiling Tiles (BOH)', check: 'Assess in prep area/BOH. Check for water stained, missing, broken, damaged, mismatched, not properly fitted tiles. Check dusty/greasy vents/tiles, debris/food splatter, chipped paint on vents, rust on vents.', tips: 'None.' },
            '582': { title: 'Drains, Grease Trap Cover', check: 'Check floor drains (NOT floors). Check for damaged/missing drain cover, debris, grease/mold build-up, worn grout around drain, damaged grease trap cover/lid (rusted), odor.', tips: 'Cross-reference: score cleanliness of grease trap cover/lid under FSA item 236. Do NOT score cleanliness of grease trap cover here.' },
            '583': { title: 'Doors (BOH)', check: 'Check cleanliness: fingerprints, debris, sticky. Assess condition: rust, damaged/broken, chipped paint.', tips: 'None.' },
            '584': { title: 'Trash Cans (BOH)', check: 'Check cleanliness: debris (inside, outside, handles), odor. Assess condition: damaged can. Score if trash full.', tips: 'Cross-reference: also score FSA item 237.' },
            '585': { title: 'Caster Wheels (BOH)', check: 'Assess on prep area equipment. Check for grease/dust on wheels, missing, damaged, rusted.', tips: 'None.' },
            '586': { title: 'Table Legs (BOH)', check: 'Assess in prep area/BOH. Check for grease/dust, debris, damaged legs, rusted legs.', tips: 'None.' },
            '587': { title: 'Mop Sink', check: 'Assess mop sink. Check for mops/brooms/squeegee not hung to dry, mop sink not clean, mop sink damaged, mop sink not organized, mop bucket not clean, mop bucket damaged, garden hose laying in mop sink (should be coiled and hung), odor.', tips: 'Do not assess floor cleaner dispenser hose.' },
            '588': { title: 'Wall-Mounted Dunnage Racks', check: 'Assess wall-mounted racks in prep area/BOH (NOT free-standing shelving). Check for grease/dust, debris, damaged racks.', tips: 'None.' },
            '595': { title: 'Tables and Chairs', check: 'Check tables/chairs not clean, tables/chairs in poor condition.', tips: 'For mall/airport, mark NA and all patio items autofill NA.' },
            '596': { title: 'Trash Cans (Patio)', check: 'Check cleanliness: debris (inside, outside, handles), odor. Assess condition: damaged can. Score if trash full.', tips: 'Cross-reference: also score FSA item 237.' },
            '597': { title: 'Umbrellas', check: 'Assess umbrellas. Score for: broken, torn, cleanliness (mold, debris, dust).', tips: 'Do not assess if umbrellas not present or not opened.' },
        };

        /* ===== VOICE MIC BUTTON ===== */
        const SUPABASE_URL = 'https://mshgqgswajtammwwfxvi.supabase.co';
        const ACCESS_CODE = ''; // Set your APP_PASSWORD here to enable voice

        function VoiceMicButton({ onResult, disabled }) {
            const [state, setState] = useState('idle'); // idle | listening | processing
            const mediaRecorderRef = React.useRef(null);
            const chunksRef = React.useRef([]);

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                    mediaRecorderRef.current = mediaRecorder;
                    chunksRef.current = [];

                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        setState('processing');
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        try {
                            const formData = new FormData();
                            formData.append('audio', blob, 'recording.webm');
                            const res = await fetch(`${SUPABASE_URL}/functions/v1/voice-to-form`, {
                                method: 'POST',
                                headers: { 'x-access-code': ACCESS_CODE },
                                body: formData,
                            });
                            const data = await res.json();
                            if (data.success && data.parsed) {
                                onResult({ transcript: data.transcript, parsed: data.parsed });
                            } else {
                                alert('Voice processing error: ' + (data.error || 'Unknown error'));
                            }
                        } catch (err) {
                            alert('Connection error: ' + err.message);
                        }
                        setState('idle');
                    };

                    mediaRecorder.start();
                    setState('listening');
                } catch (err) {
                    alert('Microphone access denied. Please allow mic access and try again.');
                    setState('idle');
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
                    mediaRecorderRef.current.stop();
                }
            };

            const handleClick = () => {
                if (state === 'idle') startRecording();
                else if (state === 'listening') stopRecording();
            };

            return (
                <button
                    onClick={handleClick}
                    disabled={disabled || state === 'processing'}
                    className="flex items-center gap-2 text-xs font-semibold py-2 px-4 rounded-lg transition"
                    style={{

        /* ===== VOICE NOTES BUTTON (Browser Speech API) ===== */
        function VoiceNotesButton({ value, onChange, placeholder }) {
            const [listening, setListening] = useState(false);
            const recognitionRef = React.useRef(null);
            const supported = typeof window !== 'undefined' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

            const startListening = () => {
                if (!supported) { alert('Voice input is not supported in this browser. Try Chrome or Safari.'); return; }
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                let finalTranscript = '';
                let interimTranscript = '';

                recognition.onresult = (event) => {
                    finalTranscript = '';
                    interimTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }
                    if (finalTranscript) {
                        const prev = value || '';
                        const separator = prev && !prev.endsWith(' ') && !prev.endsWith('\n') ? ' ' : '';
                        onChange(prev + separator + finalTranscript.trim());
                    }
                };
                recognition.onerror = (e) => {
                    if (e.error !== 'aborted') console.warn('Speech error:', e.error);
                    setListening(false);
                };
                recognition.onend = () => { setListening(false); };

                recognitionRef.current = recognition;
                recognition.start();
                setListening(true);
            };

            const stopListening = () => {
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                    recognitionRef.current = null;
                }
                setListening(false);
            };

            if (!supported) return null;

            return (
                <button type="button" onClick={listening ? stopListening : startListening}
                    className="flex items-center gap-1.5 text-xs font-semibold py-1.5 px-3 rounded-lg transition"
                    style={{
                        background: listening ? 'rgba(var(--fg-red-rgb),0.15)' : 'rgba(255,255,255,0.05)',
                        color: listening ? 'var(--fg-red)' : 'rgba(255,255,255,0.5)',
                        border: listening ? '1px solid var(--fg-red)' : '1px solid rgba(255,255,255,0.10)',
                        cursor: 'pointer',

                            <span style={{animation:'pulse 1.5s infinite'}}>Listening...</span>
                        </React.Fragment>

                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>

                                cursor:'pointer', color:'rgba(255,255,255,0.5)', fontSize:'12px', padding:0}}>×</button>
                    ) : (
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="2.5"
                            style={{position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', pointerEvents:'none'}}>
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    )}
                    {open && (
                        <div style={{
                            position:'absolute', top:'100%', left:0, right:0, zIndex:50,
                            background:'#1a1a1a', border:'1px solid rgba(255,255,255,0.12)',
                            borderRadius:'10px', marginTop:'4px', maxHeight:'200px', overflowY:'auto',
                            boxShadow:'0 8px 24px rgba(0,0,0,0.5)'
                        }}>
                            {filtered.length === 0 ? (
                                <div style={{padding:'10px 14px', color:'rgba(255,255,255,0.3)', fontSize:'13px'}}>No matches</div>
                            ) : filtered.map((o, i) => {
                                const val = typeof o === 'string' ? o : o.value;
                                const label = typeof o === 'string' ? o : o.label;
                                const isSelected = val === value;
                                return (
                                    <div key={i} onClick={() => { onChange(val); setOpen(false); setQuery(''); }}
                                        style={{
                                            padding:'10px 14px', fontSize:'13px', cursor:'pointer',
                                            color: isSelected ? 'white' : 'rgba(255,255,255,0.7)',
                                            background: isSelected ? 'rgba(255,255,255,0.08)' : 'transparent',
                                        }}
                                        onMouseEnter={e => e.target.style.background = 'rgba(255,255,255,0.06)'}
                                        onMouseLeave={e => e.target.style.background = isSelected ? 'rgba(255,255,255,0.08)' : 'transparent'}
                                    >{label}</div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        /* ===== MULTI-OBSERVATION FORM COMPONENT ===== */
        // Reusable form for items where specialists find multiple observations per audit
        // Renders repeating observation blocks with "Add Another" button
        function MultiObsForm({ config, itemKey, observations, onChange, rootCauses, isRepeat, itemPoints, photos, onPhotosChange }) {
            const obs = observations || [{}];
            const updateObs = (idx, field, val) => {
                const updated = [...obs];
                updated[idx] = { ...updated[idx], [field]: val };
                onChange(updated);
            };
            const addObs = () => onChange([...obs, {}]);
            const removeObs = (idx) => { if (obs.length > 1) onChange(obs.filter((_, i) => i !== idx)); };

            // Validation: check if any observation is incomplete
            const fieldKeys = Object.keys(config.fields);
            const incomplete = obs.some(o => fieldKeys.some(k => !o[k]) || !o.rootCause);

            return (
                <div className="mt-3 p-3 rounded-lg anim-fade-slide" style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.08)', borderLeft:'3px solid var(--fg-red)'}}>
                    {obs.map((o, oi) => (
                        <div key={oi} className={oi > 0 ? 'mt-4 pt-4' : ''} style={oi > 0 ? {borderTop:'1px solid rgba(255,255,255,0.06)'} : {}}>
                            <div className="flex items-center justify-between mb-3">
                                <p className="text-gray-300 text-xs font-semibold">{config.obsLabel} {oi + 1}</p>
                                {obs.length > 1 && (
                                    <button onClick={() => removeObs(oi)} className="text-xs py-1 px-2 rounded"
                                        style={{background:'rgba(var(--fg-red-rgb),0.08)', border:'1px solid rgba(var(--fg-red-rgb),0.2)', color:'#f87171', cursor:'pointer', fontSize:'11px'}}>
                                        Remove
                                    </button>
                                )}
                            </div>
                            <div className={`grid gap-2 mb-2`} style={{gridTemplateColumns: `repeat(${Math.min(fieldKeys.length, 3)}, 1fr)`}}>
                                {fieldKeys.map(fk => {
                                    const f = config.fields[fk];
                                    return (
                                        <div key={fk}>
                                            <label className="block text-gray-400 text-xs mb-1">{f.label}</label>
                                            <SearchableSelect
                                                value={o[fk] || ''}
                                                onChange={v => updateObs(oi, fk, v)}
                                                placeholder={`Select ${f.label.toLowerCase()}...`}
                                                options={[...f.options, {label:'Other (type below)', value:'OTHER_'+fk}]}
                                            />
                                            {o[fk] === 'OTHER_'+fk && (
                                                <input type="text" value={o[fk+'Other']||''} onChange={e => updateObs(oi, fk+'Other', e.target.value)}
                                                    placeholder={`Describe ${f.label.toLowerCase()}...`} className="fg-input text-sm mt-1" />
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            {/* Temperature capture for hot holding (103) */}
                            {config.tempMode === 'hot' && (
                                <div className="grid grid-cols-2 gap-2 mb-2">
                                    <div>
                                        <label className="block text-gray-400 text-xs mb-1">Product Temp (°F)</label>
                                        <input type="text" inputMode="decimal" value={o.temp||''} onChange={e => updateObs(oi, 'temp', e.target.value)} placeholder="e.g. 125.4" className="fg-input text-sm" />
                                    </div>
                                    <div className="flex items-end">
                                        {o.temp && (
                                            <span className="text-xs font-bold px-2 py-1 rounded" style={{
                                                color: parseFloat(o.temp) < 120 ? '#f87171' : parseFloat(o.temp) < 140 ? '#fbbf24' : '#22c55e',
                                                background: parseFloat(o.temp) < 120 ? 'rgba(248,113,113,0.1)' : parseFloat(o.temp) < 140 ? 'rgba(251,191,36,0.1)' : 'rgba(34,197,94,0.1)'
                                            }}>
                                                {parseFloat(o.temp) < 120 ? '5 pt deduction' : parseFloat(o.temp) < 140 ? '3 pt deduction' : 'Compliant (≥140°F)'}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            )}
                            {/* PPM capture for sanitizer (120) */}
                            {config.ppmMode && (
                                <div className="mb-2">
                                    <label className="block text-gray-400 text-xs mb-1">PPM Reading</label>
                                    <input type="text" inputMode="decimal" value={o.ppm||''} onChange={e => updateObs(oi, 'ppm', e.target.value)} placeholder="e.g. 200" className="fg-input text-sm" style={{maxWidth:'160px'}} />
                                </div>
                            )}
                            {/* Root cause */}
                            <div className="mb-2">
                                <label className="block text-gray-400 text-xs mb-1">Root Cause</label>
                                <SearchableSelect
                                    value={o.rootCause || ''}
                                    onChange={v => updateObs(oi, 'rootCause', v)}
                                    placeholder="What caused this?"
                                    options={[...rootCauses, {label:'Other (type below)', value:'OTHER'}]}
                                />
                                {o.rootCause === 'OTHER' && (
                                    <input type="text" value={o.rootCauseOther||''} onChange={e => updateObs(oi, 'rootCauseOther', e.target.value)}
                                        placeholder="Describe root cause..." className="fg-input text-sm mt-1" />
                                )}
                            </div>
                            <div>
                                <div className="flex items-center justify-between mb-1">
                                    <label className="block text-gray-400 text-xs">Notes</label>
                                    <VoiceNotesButton value={o.notes||''} onChange={v => updateObs(oi, 'notes', v)} />
                                </div>
                                <textarea value={o.notes||''} onChange={e => updateObs(oi, 'notes', e.target.value)} placeholder="Additional details..." className="fg-input text-sm" rows="2" style={{resize:'none'}} />
                            </div>
                            <PhotoCapture
                                photos={(photos || {})[`${itemKey}_mo${oi}`] || []}
                                onPhotosChange={p => onPhotosChange({...(photos||{}), [`${itemKey}_mo${oi}`]: p})}
                            />
                        </div>
                    ))}
                    {/* Validation hint */}
                    {incomplete && (
                        <div className="flex items-center gap-2 mt-3 px-2 py-1.5 rounded-lg" style={{background:'rgba(251,191,36,0.06)', border:'1px solid rgba(251,191,36,0.15)'}}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                            <span className="text-xs" style={{color:'#fbbf24'}}>Some observations are incomplete — fill in all fields and root cause</span>
                        </div>
                    )}
                    {/* Photo nudge */}
                    {obs.every((_,oi) => !(photos || {})[`${itemKey}_mo${oi}`] || (photos || {})[`${itemKey}_mo${oi}`].length === 0) && (
                        <div className="flex items-center gap-2 mt-2 px-2 py-1" style={{color:'rgba(251,191,36,0.7)'}}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <span className="text-xs">Photo recommended — capture evidence for each observation</span>
                        </div>
                    )}
                    {isRepeat && (
                        <div className="flex items-center gap-2 mt-3 px-2 py-1.5 rounded-lg" style={{background:'rgba(var(--fg-red-rgb),0.08)', border:'1px solid rgba(var(--fg-red-rgb),0.2)'}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f87171" strokeWidth="2"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span className="text-xs font-semibold" style={{color:'#f87171'}}>Repeat Finding — flagged from prior audit (+1 pt)</span>
                        </div>
                    )}
                    <button onClick={addObs} className="mt-3 text-xs font-semibold py-2 px-4 rounded-lg" style={{background:'rgba(255,255,255,0.06)', color:'rgba(255,255,255,0.7)', border:'1px solid rgba(255,255,255,0.12)'}}>
                        + Add Another {config.obsLabel}
                    </button>
                    <p className="text-gray-500 text-xs mt-2">
                        {obs.length} observation{obs.length !== 1 ? 's' : ''} &bull; Deduction: {itemPoints}{isRepeat ? ` + 1 repeat = ${itemPoints + 1} pts` : ' pts'}
                    </p>
                </div>
            );
        }

        /* ===== QUICK-ADD OBSERVATION PANEL ===== */
        // Floating panel that lets specialists add observations from anywhere during walkthrough
        // Solves the "area-based scoring" problem: walking the cook line and see a floor issue?
        // Quick Jump — navigate to any FSA or MMCCA item from anywhere
        function QuickAddPanel({ isOpen, onClose, assessmentScores, onJump, includeMMCCA }) {
            const [jumpTab, setJumpTab] = useState('fsa');

            if (!isOpen) return null;

            const categories = jumpTab === 'fsa' ? ASSESSMENT_DATA.categories : MMCCA_DATA.categories;
            const accentColor = jumpTab === 'fsa' ? 'var(--fg-red)' : '#fb923c';

            return (
                <div style={{position:'fixed', inset:0, zIndex:60, background:'rgba(0,0,0,0.6)', backdropFilter:'blur(4px)', WebkitBackdropFilter:'blur(4px)', display:'flex', alignItems:'center', justifyContent:'center', padding:'20px'}} onClick={onClose}>
                    <div onClick={e => e.stopPropagation()} className="anim-fade-slide" style={{position:'relative', width:'100%', maxWidth:'480px', maxHeight:'80vh', overflowY:'auto', background:'#141414', border:'1px solid rgba(255,255,255,0.08)', borderTop:`3px solid ${accentColor}`, borderRadius:'16px', padding:'20px 16px', boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}>
                        {/* Handle bar */}
                        <div style={{width:'40px',height:'4px',background:'rgba(255,255,255,0.15)',borderRadius:'2px',margin:'0 auto 16px'}}></div>
                        {/* Header */}
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={accentColor} strokeWidth="2.5"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
                                <h3 className="text-white font-bold" style={{fontFamily:'Outfit',fontSize:'16px'}}>Quick Jump</h3>
                            </div>
                            <button onClick={onClose} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:'50%',width:'32px',height:'32px',color:'white',fontSize:'16px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                        </div>

                        {/* FSA / MMCCA toggle */}
                        {includeMMCCA && (
                            <div className="flex gap-1 mb-4 p-1 rounded-lg" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.06)'}}>
                                <button onClick={() => setJumpTab('fsa')}
                                    style={{flex:1, padding:'8px 12px', borderRadius:'8px', border:'none', cursor:'pointer', fontSize:'12px', fontWeight:700, fontFamily:'Outfit', letterSpacing:'0.05em',
                                        background: jumpTab === 'fsa' ? 'rgba(var(--fg-red-rgb),0.15)' : 'transparent',
                                        color: jumpTab === 'fsa' ? '#f87171' : 'rgba(255,255,255,0.4)'}}>
                                    FSA ITEMS
                                </button>
                                <button onClick={() => setJumpTab('mmcca')}
                                    style={{flex:1, padding:'8px 12px', borderRadius:'8px', border:'none', cursor:'pointer', fontSize:'12px', fontWeight:700, fontFamily:'Outfit', letterSpacing:'0.05em',
                                        background: jumpTab === 'mmcca' ? 'rgba(251,146,60,0.15)' : 'transparent',
                                        color: jumpTab === 'mmcca' ? '#fb923c' : 'rgba(255,255,255,0.4)'}}>
                                    MMCCA ITEMS
                                </button>
                            </div>
                        )}

                        {/* Category list with items */}
                        <div className="space-y-4">
                            {categories.map(cat => {
                                const Icon = cat.icon;
                                return (
                                    <div key={cat.id}>
                                        <div className="flex items-center gap-2 mb-2">
                                            <div style={{width:'24px',height:'24px',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'6px',
                                                background: jumpTab === 'fsa' ? 'rgba(var(--fg-red-rgb),0.08)' : 'rgba(251,146,60,0.08)',
                                                border: `1px solid ${jumpTab === 'fsa' ? 'rgba(var(--fg-red-rgb),0.2)' : 'rgba(251,146,60,0.2)'}`}}>
                                                <Icon />
                                            </div>
                                            <span className="text-xs font-bold heading-spaced" style={{color: accentColor}}>{cat.name}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-1.5">
                                            {cat.items.map(item => {
                                                const itemKey = `${cat.id}_${item.code}`;
                                                const scored = assessmentScores[itemKey];
                                                const isNC = scored === 'NOT_COMPLIANT';
                                                const isC = scored === 'COMPLIANT';
                                                const isNA = scored === 'N_A';
                                                return (
                                                    <button key={item.code} onClick={() => { onJump(cat.id, item.code); onClose(); }}
                                                        className="text-left p-2 rounded-lg transition"
                                                        style={{background: isNC ? 'rgba(248,113,113,0.06)' : isC ? 'rgba(34,197,94,0.04)' : 'rgba(255,255,255,0.02)',
                                                            border: `1px solid ${isNC ? 'rgba(248,113,113,0.15)' : isC ? 'rgba(34,197,94,0.1)' : 'rgba(255,255,255,0.06)'}`,
                                                            cursor:'pointer'}}>
                                                        <div className="flex items-center gap-1.5">
                                                            <span className="fg-badge fg-badge-code" style={{fontSize:'9px',padding:'1px 5px'}}>{item.code}</span>
                                                            {isNC && <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#f87171',flexShrink:0}}></span>}
                                                            {isC && <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#22c55e',flexShrink:0}}></span>}
                                                            {isNA && <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#6b7280',flexShrink:0}}></span>}
                                                        </div>
                                                        <p className="text-gray-400 mt-1" style={{fontSize:'10px',lineHeight:'1.3',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{item.title}</p>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        /* ===== LOGO LOCKUP COMPONENT ===== */
        function LogoLockup({ size = 'lg' }) {
            const brandClass = size === 'lg' ? 'text-4xl md:text-5xl' : 'text-2xl';
            const subClass = size === 'lg' ? 'text-sm md:text-base' : 'text-xs';
            return (
                <div className="flex flex-col items-center">
                    <span className={`font-extrabold ${brandClass} text-white`} style={{fontFamily:'Outfit, sans-serif', letterSpacing:'0.08em'}}>
                        FIVE GUYS<span style={{fontSize:'0.35em', verticalAlign:'super', opacity:0.4}}>®</span>
                    </span>
                    <span className="block mt-2 mb-2" style={{width:'32px', height:'2px', background:'var(--fg-red)', borderRadius:'1px'}}></span>
                    <span className={`${subClass}`} style={{fontFamily:'Inter, sans-serif', fontWeight:300, letterSpacing:'0.25em', color:'rgba(255,255,255,0.45)'}}>
                        GLOBAL FOOD SAFETY PLATFORM
                    </span>
                </div>
            );
        }

        /* ===== PHOTO CAPTURE COMPONENT ===== */
        function PhotoCapture({ photos = [], onPhotosChange }) {
            const fileRef = React.useRef(null);
            const canvasRef = React.useRef(null);
            // FEATURE 8: Photo Annotation
            const [annotating, setAnnotating] = useState(null); // { photoIndex, active: true }
            const [isDrawing, setIsDrawing] = useState(false);
            const [lastPos, setLastPos] = useState(null);

            const handleFiles = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        onPhotosChange([...photos, { dataUrl: ev.target.result, caption: '', timestamp: new Date().toLocaleTimeString() }]);
                    };
                    reader.readAsDataURL(file);
                });
                e.target.value = '';
            };

            const removePhoto = (index) => {
                const updated = photos.filter((_, i) => i !== index);
                onPhotosChange(updated);
            };

            const updateCaption = (index, caption) => {
                const updated = [...photos];
                updated[index] = {...updated[index], caption};
                onPhotosChange(updated);
            };

            // FEATURE 8: Handle annotation drawing
            const startAnnotation = (index) => {
                setAnnotating({photoIndex: index, active: true});
            };

            const endAnnotation = () => {
                if (annotating && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const dataUrl = canvas.toDataURL('image/png');
                    const updated = [...photos];
                    updated[annotating.photoIndex] = {...updated[annotating.photoIndex], dataUrl};
                    onPhotosChange(updated);
                    setAnnotating(null);
                }
            };

            const handleMouseDown = (e) => {
                if (!canvasRef.current) return;
                const rect = canvasRef.current.getBoundingClientRect();
                setIsDrawing(true);
                setLastPos({x: e.clientX - rect.left, y: e.clientY - rect.top});
            };

            const handleMouseMove = (e) => {
                if (!isDrawing || !canvasRef.current || !lastPos) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                ctx.strokeStyle = '#c41230';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(lastPos.x, lastPos.y);
                ctx.lineTo(x, y);
                ctx.stroke();
                setLastPos({x, y});
            };

            const handleMouseUp = () => {
                setIsDrawing(false);
            };

            return (
                <div className="mt-3">
                    <div className="flex items-center justify-between mb-2">
                        <label className="block text-gray-400 text-xs font-semibold">Photos</label>
                        <button onClick={() => fileRef.current?.click()}
                            className="flex items-center gap-1.5 text-xs font-semibold py-1.5 px-3 rounded-lg"
                            style={{background:'rgba(255,255,255,0.06)', color:'rgba(255,255,255,0.7)', border:'1px solid rgba(255,255,255,0.12)'}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                            </svg>
                            Add Photo
                        </button>
                        <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple onChange={handleFiles} style={{display:'none'}} />
                    </div>
                    {photos.length > 0 && (
                        <div className="grid grid-cols-3 gap-2">
                            {photos.map((photo, i) => (
                                <div key={i} className="relative rounded-lg overflow-hidden" style={{border:'1px solid rgba(255,255,255,0.1)'}}>
                                    <img src={photo.dataUrl} alt={`Photo ${i+1}`} style={{width:'100%', height:'80px', objectFit:'cover'}} />
                                    <div style={{position:'absolute', top:'4px', right:'4px', display:'flex', gap:'4px'}}>
                                        {/* FEATURE 8: Annotate button */}
                                        <button onClick={() => startAnnotation(i)}
                                            style={{width:'20px', height:'20px', borderRadius:'50%',
                                                background:'rgba(196,18,48,0.7)', border:'none', color:'white', fontSize:'12px', cursor:'pointer',
                                                display:'flex', alignItems:'center', justifyContent:'center'}} title="Annotate">◉</button>
                                        <button onClick={() => removePhoto(i)}
                                            style={{width:'20px', height:'20px', borderRadius:'50%',
                                                background:'rgba(0,0,0,0.7)', border:'none', color:'white', fontSize:'12px', cursor:'pointer',
                                                display:'flex', alignItems:'center', justifyContent:'center'}}>×</button>
                                    </div>
                                    <input type="text" placeholder="Caption..." value={photo.caption} onChange={e => updateCaption(i, e.target.value)}
                                        style={{width:'100%', padding:'4px 6px', fontSize:'10px', background:'rgba(0,0,0,0.5)',
                                            border:'none', color:'white', outline:'none'}} />
                                </div>
                            ))}
                        </div>
                    )}

                    {/* FEATURE 8: Photo Annotation Canvas */}
                    {annotating && annotating.active && (
                        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
                            <div style={{background:'rgba(10,10,10,0.95)',border:'1px solid rgba(196,18,48,0.3)',borderRadius:'12px',padding:'20px',maxWidth:'90vw',maxHeight:'90vh'}}>
                                <p className="text-white text-sm font-semibold mb-3">Draw annotations on photo (red pen)</p>
                                <canvas ref={canvasRef} width={400} height={300} style={{border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',background:'white',cursor:'crosshair',display:'block',marginBottom:'12px'}}
                                    onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
                                    onLoad={() => {
                                        const img = new Image();
                                        img.src = photos[annotating.photoIndex]?.dataUrl || '';
                                        img.onload = () => {
                                            const canvas = canvasRef.current;
                                            const ctx = canvas.getContext('2d');
                                            ctx.drawImage(img, 0, 0, 400, 300);
                                        };
                                    }}
                                />
                                {/* Initialize canvas with image */}
                                {canvasRef.current && (() => {
                                    const img = new Image();
                                    img.src = photos[annotating.photoIndex]?.dataUrl || '';
                                    img.onload = () => {
                                        const ctx = canvasRef.current.getContext('2d');
                                        ctx.drawImage(img, 0, 0, 400, 300);
                                    };
                                    return null;
                                })()}
                                <div className="flex gap-3">
                                    <button onClick={endAnnotation} className="flex-1 py-2 px-4 rounded-lg font-semibold text-white" style={{background:'var(--fg-red)',border:'1px solid var(--fg-red)',cursor:'pointer'}}>
                                        Save
                                    </button>
